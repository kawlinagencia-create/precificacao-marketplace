<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Precificação — Agência</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#f7f7f5;--surface:#fff;--surface2:#f0f0ec;--border:#e5e5e0;--border2:#d0d0c8;--text:#1a1a18;--text2:#6b6b65;--text3:#9b9b94;--accent:#2d6a4f;--accent-bg:#e8f5ee;--accent-text:#1b4332;--danger:#c1121f;--danger-bg:#fee2e2;--warn:#d97706;--warn-bg:#fef3c7;--orange:#c05621;--orange-bg:#fff0e6;--success:#166534;--success-bg:#dcfce7;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:8px;--r-lg:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-logo-title{font-size:13px;font-weight:600}
.sb-logo-sub{font-size:11px;color:var(--text3);margin-top:1px}
.sb-section{padding:10px 8px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.sb-list{flex:1;overflow-y:auto;padding:4px 8px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-count{margin-left:auto;font-size:10px;background:var(--surface2);color:var(--text3);padding:1px 6px;border-radius:20px}
.sb-item.active .sb-count{background:var(--accent);color:#fff}
.sb-footer{padding:8px;border-top:1px solid var(--border)}
.sb-add-btn{display:flex;align-items:center;gap:6px;width:100%;padding:8px 10px;border-radius:var(--r);border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.sb-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;height:52px;gap:12px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px;flex:1}
.topbar-title{font-size:15px;font-weight:600}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-gray{background:var(--surface2);color:var(--text3)}
.tabs{display:flex;gap:1px;background:var(--surface2);padding:3px;border-radius:var(--r);border:1px solid var(--border)}
.tab-btn{padding:5px 11px;font-size:12px;border-radius:6px;cursor:pointer;color:var(--text2);border:none;background:transparent;font-family:var(--font);transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.content{flex:1;overflow-y:auto;padding:20px}
.search-wrap{position:relative;margin-bottom:12px}
.search-input{width:100%;padding:9px 36px 9px 36px;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface);font-size:13px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-icon-left{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:15px}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;font-size:14px}
.scope-row{display:flex;gap:6px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.scope-btn{padding:4px 10px;font-size:11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .15s}
.scope-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.prod-card{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:8px;background:var(--surface)}
.prod-card-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:12px}
.prod-card-head:hover{background:var(--surface2)}
.prod-card-name{font-size:13px;font-weight:600}
.prod-card-meta{font-size:11px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.prod-card-body{border-top:1px solid var(--border);padding:14px 16px;background:var(--surface2);display:none}
.prod-card-body.open{display:block}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;padding:7px 10px;color:var(--text3);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--surface);white-space:nowrap}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr.selected td{background:#dbeafe!important;outline:2px solid #3b82f6;outline-offset:-1px}
.data-table tbody tr{cursor:pointer}
.data-table td.mono{font-family:var(--mono);font-size:11px}
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;margin:1px;white-space:nowrap}
.chip-shopee{background:#fee2d5;color:#9d2a0a}
.chip-shein{background:#d1fae5;color:#065f46}
.chip-ml{background:#fef9c3;color:#713f12}
.chip-tiktok{background:#f1f5f9;color:#334155}
.chip-kit{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.lv{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap;font-family:var(--mono)}
.lv-g{background:var(--success-bg);color:var(--success)}
.lv-a{background:var(--warn-bg);color:var(--warn)}
.lv-l{background:var(--orange-bg);color:var(--orange)}
.lv-r{background:var(--danger-bg);color:var(--danger)}
mark{background:#fef08a;border-radius:2px;padding:0 1px;color:inherit}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500}
.kpi-val{font-size:22px;font-weight:600;font-family:var(--mono)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
.kpi.danger .kpi-val{color:var(--danger)}
.kpi.success .kpi-val{color:var(--success)}
.kpi.warn .kpi-val{color:var(--warn)}
.bar-wrap{display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:11px}
.bar-label{width:150px;flex-shrink:0;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:12px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.bar-val{width:70px;text-align:right;font-weight:600;font-family:var(--mono);font-size:11px}
.sec{margin-bottom:22px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-title{font-size:13px;font-weight:600}
.sec-line{flex:1;height:1px;background:var(--border)}
.alert-list{display:flex;flex-direction:column;gap:6px}
.alert-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--r-lg);border:1px solid}
.alert-item.red{border-color:#fca5a5;background:#fff5f5}
.alert-item.orange{border-color:#fdba74;background:#fff7ed}
.alert-item.yellow{border-color:#fcd34d;background:#fffbeb}
.taxas-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.taxa-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px}
.taxa-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.taxa-row:last-child{border-bottom:none}
.taxa-input{width:65px;padding:3px 7px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);text-align:right;font-family:var(--mono);outline:none}
.taxa-input:focus{border-color:var(--accent)}
.taxa-name-input{flex:1;padding:3px 7px;font-size:12px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--text);font-family:var(--font);outline:none}
.taxa-name-input:hover{border-color:var(--border);background:var(--surface2)}
.taxa-name-input:focus{border-color:var(--accent);background:var(--surface)}
.taxa-add-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.taxa-add-input{flex:1;padding:5px 8px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-family:var(--font);outline:none}
.calc-wrap{display:grid;grid-template-columns:320px 1fr;gap:16px;max-width:920px}
.calc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px}
.calc-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.calc-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.calc-row:last-child{border-bottom:none}
.calc-row.total{font-weight:700;font-size:13px}
.calc-val{font-family:var(--mono);font-weight:600}
.calc-input{padding:6px 10px;font-size:13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);outline:none;text-align:right;width:130px}
.calc-input:focus{border-color:var(--accent);background:var(--surface)}
.calc-select{padding:6px 10px;font-size:13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);outline:none;width:130px}
.taxa-detail-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:11px;border-bottom:1px dashed var(--border)}
.taxa-detail-row:last-child{border-bottom:none}
.sugestao-box{background:var(--accent-bg);border-radius:var(--r);padding:12px;margin-top:10px}
.sugestao-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);width:620px;max-width:96vw;max-height:90vh;overflow-y:auto;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:600}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
.form-input{width:100%;padding:8px 10px;font-size:13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kit-block{background:var(--surface2);border-radius:var(--r);padding:12px;margin-bottom:8px;border:1px solid var(--border)}
/* Tooltip */
.tip-wrap{position:relative;display:inline-block;cursor:help}
.tip-wrap .tip{display:none;position:fixed;background:var(--text);color:#fff;border-radius:var(--r);padding:8px 10px;font-size:11px;white-space:nowrap;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);min-width:200px;pointer-events:none}
.tip-wrap:hover .tip{display:block}
.tip-row{display:flex;justify-content:space-between;gap:16px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.12)}
.tip-row:last-child{border-bottom:none;font-weight:700;margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,.25)}
/* Lucro preview no kit */
.lucro-preview{margin-top:8px;padding:8px 10px;border-radius:var(--r);font-size:12px;border:1px solid var(--border)}
.lucro-preview.pos{background:var(--success-bg);border-color:#86efac;color:var(--success)}
.lucro-preview.neg{background:var(--danger-bg);border-color:#fca5a5;color:var(--danger)}
.lucro-preview.neu{background:var(--surface2);color:var(--text3)}
.plat-checks{display:flex;flex-wrap:wrap;gap:6px}
.plat-cb{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:12px;user-select:none;transition:all .15s;background:var(--surface)}
.plat-cb.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.tgl-group{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;width:fit-content}
.tgl-btn{padding:7px 14px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s;border-right:1px solid var(--border)}
.tgl-btn:last-child{border-right:none}
.tgl-btn.on{background:var(--text);color:#fff;font-weight:500}
.divider{height:1px;background:var(--border);margin:16px 0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;border:1px solid transparent}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{opacity:.85}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-outline:hover{background:var(--surface2)}
.btn-icon{background:transparent;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;display:flex;align-items:center;transition:all .15s}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-icon.danger:hover{color:var(--danger);background:var(--danger-bg)}
.config-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;max-width:500px}
.config-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.foto-upload{width:90px;height:90px;border-radius:var(--r-lg);border:2px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;background:var(--surface2)}
.foto-upload:hover{border-color:var(--accent)}
.foto-upload img{width:100%;height:100%;object-fit:cover}
.foto-txt{font-size:10px;color:var(--text3);text-align:center;padding:4px}
.prod-foto{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0}
.prod-foto-ph{width:36px;height:36px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.link-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;text-decoration:none;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s}
.link-chip:hover{background:var(--accent-bg);color:var(--accent-text)}
.plat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.plat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 14px}
.plat-stat{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border)}
.plat-stat:last-child{border-bottom:none}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);gap:10px;font-size:13px}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:12px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:slideIn .2s ease}
.toast.error{background:var(--danger)}
.toast.success{background:var(--success)}
@keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.shopee-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:20px;font-size:9px;font-weight:600;background:#fef9c3;color:#713f12;margin-left:4px}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:14px}
.filter-input{padding:5px 10px;font-size:12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);outline:none;min-width:0}
.filter-input:focus{border-color:var(--accent);background:var(--surface)}
.filter-select{padding:5px 10px;font-size:12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);outline:none}
.filter-clear{font-size:11px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:var(--font);padding:4px 6px;border-radius:var(--r)}
.filter-clear:hover{color:var(--danger);background:var(--danger-bg)}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
</style>
</head>

async function saveProduct(p,clientId,produtoAntigo){
  const pay={client_id:clientId,sku:p.sku,nome:p.nome,fabricacao:p.fabricacao||false,plataformas:p.plataformas,kits:p.kits,foto_url:p.foto_url||null,links:p.links||{}};
  if(p.id&&!String(p.id).startsWith('new')){
    const{error}=await sb.from('prec_products').update(pay).eq('id',p.id);
    if(error){console.error('Erro ao salvar produto:',error);throw new Error(error.message||'Falha ao salvar produto no banco');}
    // Registrar histórico de alterações de preço/custo
    if(produtoAntigo) await registrarHistorico(produtoAntigo,p,clientId);
  }
  else{
    const{data,error}=await sb.from('prec_products').insert(pay).select().single();
    if(error){console.error('Erro ao criar produto:',error);throw new Error(error.message||'Falha ao criar produto no banco');}
    if(data)p.id=data.id;
  }
}
async function registrarHistorico(antigo,novo,clientId){
  const cli=ST.clients.find(c=>String(c.id)===String(clientId));
  if(!cli) return;
  const registros=[];
  const kitsAntigos=antigo.kits||[];
  const kitsNovos=novo.kits||[];
  for(const kNovo of kitsNovos){
    const kAntigo=kitsAntigos.find(k=>k.qty===kNovo.qty);
    if(!kAntigo) continue; // kit novo, sem histórico anterior
    const plats=new Set([...(antigo.plataformas||[]),...(novo.plataformas||[])]);
    for(const pl of plats){
      const precoAntigo=kAntigo.precos?.[pl];
      const precoNovo=kNovo.precos?.[pl];
      const custoAntigo=kAntigo.custos?.[pl];
      const custoNovo=kNovo.custos?.[pl];
      const mudouPreco=precoAntigo!==precoNovo&&(precoAntigo||precoNovo);
      const mudouCusto=custoAntigo!==custoNovo&&(custoAntigo||custoNovo);
      if(!mudouPreco&&!mudouCusto) continue;
      const rAntigo=calcR(precoAntigo,custoAntigo,pl,cli.taxas,kAntigo.peso_kg||0,kAntigo.qty);
      const rNovo=calcR(precoNovo,custoNovo,pl,cli.taxas,kNovo.peso_kg||0,kNovo.qty);
      registros.push({
        client_id:clientId,product_id:novo.id,sku:novo.sku,nome_produto:novo.nome,
        plataforma:pl,kit_qty:kNovo.qty,
        campo:mudouPreco&&mudouCusto?'preco_custo':mudouPreco?'preco':'custo',
        valor_antigo:mudouPreco?precoAntigo:custoAntigo,
        valor_novo:mudouPreco?precoNovo:custoNovo,
        lucro_antigo:rAntigo?rAntigo.lucro:null,
        lucro_novo:rNovo?rNovo.lucro:null,
        margem_antiga:rAntigo?rAntigo.margem:null,
        margem_nova:rNovo?rNovo.margem:null,
      });
    }
  }
  if(registros.length){
    const{error}=await sb.from('prec_historico').insert(registros);
    if(error)console.error('Erro ao salvar histórico:',error);
  }
}

function isTaxaFixaShopee(nome){
  const n=(nome||'').toLowerCase().trim();
  return n==='taxa fixa'||n==='taxa fixa shopee'||n==='taxa fixa (auto)';
}
function isComissaoShopee(nome){
  const n=(nome||'').toLowerCase().trim();
  return n==='comissão'||n==='comissao'||n==='taxa shopee'||n==='comissão shopee';
}
function calcR(preco,custo,platId,taxas,pesoKg,kitQty){
  if(!preco||preco<=0||!custo||custo<=0)return null;
  const t=taxas[platId];if(!t)return null;
  let totalPerc=0;const percDetail=[];
  for(const r of t.perc){let v=r.v;if(platId==='shopee'&&isComissaoShopee(r.n))v=shopeeComissao(preco)*100;totalPerc+=v/100;percDetail.push({n:r.n,v,val:preco*v/100});}
  let totalFixa=0;const fixaDetail=[];
  for(const r of t.fixas){
    let v=r.v;
    if(platId==='shopee'&&isTaxaFixaShopee(r.n)) v=shopeeTaxaFixa(preco);
    // Embalagem ou Frete por kit: usar só a taxa correspondente ao kit atual
    const nL=r.n.toLowerCase();
    const isKitSpecific=nL.includes('embal')||nL.includes('frete');
    if(isKitSpecific&&kitQty){
      // Detecta menções a kits, incluindo formatos compartilhados como "k3/5"
      const mencionaK3=/\bk3\b/.test(nL)||/k3\/5/.test(nL)||/\b3\/5\b/.test(nL);
      const mencionaK5=/\bk5\b/.test(nL)||/k3\/5/.test(nL)||/\b3\/5\b/.test(nL);
      const mencionaK10=/\bk10\b/.test(nL);
      // Se não menciona nenhum kit específico, aplica sempre (ex: "Frete" genérico sem kit no nome)
      if(mencionaK3||mencionaK5||mencionaK10){
        const kitAlvo=kitQty<=3?'k3':kitQty<=5?'k5':'k10';
        const bateK3=kitAlvo==='k3'&&mencionaK3;
        const bateK5=kitAlvo==='k5'&&mencionaK5;
        const bateK10=kitAlvo==='k10'&&mencionaK10;
        if(!bateK3&&!bateK5&&!bateK10)continue;
      }
    }
    totalFixa+=v;fixaDetail.push({n:r.n,v,val:v});
  }
  let freteML=0;
  if((platId==='ml_classico'||platId==='ml_premium')&&pesoKg>0){freteML=calcFreteML(pesoKg,preco);totalFixa+=freteML;fixaDetail.push({n:'Frete ML (auto)',v:freteML,val:freteML});}
  const tax=preco*totalPerc+totalFixa;const lucro=preco-custo-tax;
  return{lucro,margem:preco>0?lucro/preco*100:0,tax,preco,custo,percDetail,fixaDetail,freteML};
}
function cor(r,qty,c){
  if(!r)return null;
  const val=(c.regra_tipo||'peca')==='peca'?(qty>0?r.lucro/qty:r.lucro):r.margem;
  if(val<=(c.regra_t1||1.2))return 'r';if(val<=(c.regra_t2||1.5))return 'l';if(val<=(c.regra_t3||1.8))return 'a';return 'g';
}
function allRes(c){const out=[];for(const p of c.produtos)for(const pl of(p.plataformas||[]))for(const k of(p.kits||[])){const r=calcR(k.precos?.[pl],k.custos?.[pl],pl,c.taxas,k.peso_kg||0,k.qty);if(r)out.push({p,pl,k,r,cor:cor(r,k.qty,c)});}return out;}
// allPlats: todas as plataformas onde pelo menos 1 produto está cadastrado (mesmo sem dados)
function allPlats(c){const s=new Set();for(const p of c.produtos)for(const pl of(p.plataformas||[]))s.add(pl);return[...s];}
function applyFilter(arr){
  const{sku,plat}=ST.filter;
  return arr.filter(x=>{
    const p=x.p||x;
    const pl=x.pl||null;
    if(sku&&!String(p.sku||'').toLowerCase().includes(sku.toLowerCase())&&!(p.nome||'').toLowerCase().includes(sku.toLowerCase()))return false;
    if(plat){
      if(pl&&pl!==plat)return false;
      if(!pl&&!(p.plataformas||[]).includes(plat))return false;
    }
    return true;
  });
}

function bestR(p,c){let best=null,bc=null;const pri={g:4,a:3,l:2,r:1};for(const pl of(p.plataformas||[]))for(const k of(p.kits||[])){const r=calcR(k.precos?.[pl],k.custos?.[pl],pl,c.taxas,k.peso_kg||0,k.qty);if(r){const co=cor(r,k.qty,c);if(!best||(pri[co]||0)>(pri[bc]||0)){best=r;bc=co;}}}return{r:best,cor:bc};}

  </div>
  <div id="search-results"></div>`;
}
function onSearchInput(v){ST.search.q=v;updateSearch();}
function onSearchClear(){ST.search.q='';const el=document.getElementById('si');if(el)el.value='';updateSearch();}

function updateSearch(){
  const q=ST.search.q.trim(),sc=ST.search.scope;
  document.querySelectorAll('.scope-btn').forEach(b=>b.classList.toggle('active',b.dataset.scope===sc));
  const c=gc();const clis=sc==='global'?ST.clients:[c];
  let res=[];
  for(const cli of clis)for(const p of(cli.produtos||[])){
    const lq=q.toLowerCase();
    const ok=!q||(sc==='sku'&&String(p.sku||'').toLowerCase().includes(lq))||(sc==='produto'&&(p.nome||'').toLowerCase().includes(lq))||(sc!=='sku'&&sc!=='produto'&&(String(p.sku||'').toLowerCase().includes(lq)||(p.nome||'').toLowerCase().includes(lq)));
    if(ok){const{r,cor:co}=bestR(p,cli);const ar=allRes(cli).filter(x=>x.p.id===p.id);const avgM=ar.length?ar.reduce((s,x)=>s+x.r.margem,0)/ar.length:0;res.push({p,cli,r,cor:co,avgM});}
  }
  const infoEl=document.getElementById('search-info');if(infoEl)infoEl.textContent=`${res.length} resultado${res.length!==1?'s':''}`;
  const clearBtn=document.querySelector('.search-clear');if(clearBtn)clearBtn.style.display=ST.search.q?'block':'none';
  const el=document.getElementById('search-results');if(!el)return;
  if(!res.length&&q){el.innerHTML=`<div class="empty"><div style="font-size:28px;opacity:.3;margin-bottom:10px">🔎</div><div style="font-size:13px;font-weight:500">Nenhum resultado para "${q}"</div></div>`;return;}
  if(!res.length){el.innerHTML=`<div class="empty"><div style="font-size:28px;opacity:.3;margin-bottom:10px">📦</div><div style="font-size:13px;font-weight:500">Nenhum produto</div><button class="btn btn-primary" style="margin:12px auto 0" onclick="openNewProd()">+ Novo produto</button></div>`;return;}
  el.innerHTML=res.map(({p,cli,r,cor:co,avgM})=>{
    const pH=(p.plataformas||[]).map(pl=>{const po=PLATS.find(x=>x.id===pl);return po?`<span class="chip ${po.cls}">${po.label}</span>`:''}).join('');
    const kH=(p.kits||[]).map(k=>`<span class="chip chip-kit">K${k.qty}</span>`).join('');
    const lk=p.links&&Object.keys(p.links).filter(k=>p.links[k]).length?'<div style="margin-top:5px;display:flex;gap:4px;flex-wrap:wrap">'+Object.entries(p.links).filter(([,v])=>v).map(([pl,url])=>{const po=PLATS.find(x=>x.id===pl);return`<a href="${url}" target="_blank" class="link-chip" onclick="event.stopPropagation()">🔗 ${po?.label||pl}</a>`;}).join('')+'</div>':'';
    const rows=(p.plataformas||[]).flatMap(pl=>{const po=PLATS.find(x=>x.id===pl);return(p.kits||[]).map(k=>{const r2=calcR(k.precos?.[pl],k.custos?.[pl],pl,cli.taxas,k.peso_kg||0,k.qty);const co2=cor(r2,k.qty,cli);const isML=pl==='ml_classico'||pl==='ml_premium';if(!r2)return`<tr><td><span class="chip ${po?.cls}">${po?.label||pl}</span></td><td>K${k.qty}</td><td colspan="8" style="color:var(--text3)">Sem dados</td></tr>`;return`<tr><td><span class="chip ${po?.cls}">${po?.label||pl}</span></td><td class="mono">K${k.qty}</td><td class="mono" style="color:var(--text3)">${k.peso_kg>0?k.peso_kg+'kg':'—'}</td><td class="mono">R$${r2.preco.toFixed(2)}</td><td class="mono">R$${r2.custo.toFixed(2)}</td><td class="mono" style="color:var(--text3)">R$${r2.tax.toFixed(2)}</td><td>${isML&&r2.freteML>0?`<span style="font-size:10px;background:var(--accent-bg);color:var(--accent-text);padding:2px 5px;border-radius:4px">R$${r2.freteML.toFixed(2)}</span>`:'<span style="color:var(--text3)">—</span>'}</td><td><span class="lv lv-${co2}">R$${r2.lucro.toFixed(2)}</span></td><td class="mono" style="color:var(--text3)">R$${(r2.lucro/k.qty).toFixed(2)}</td><td><span class="lv lv-${co2}">${r2.margem.toFixed(1)}%</span></td></tr>`;});}).join('');
    return`<div class="prod-card"><div class="prod-card-head" onclick="togOpen('s_${p.id}')">
      <div style="display:flex;align-items:flex-start;gap:12px;flex:1;min-width:0">
        ${p.foto_url?`<img src="${p.foto_url}" class="prod-foto"/>`:`<div class="prod-foto-ph">👗</div>`}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="prod-card-name">${hlMark(p.nome,sc!=='sku'?q:'')}</span>${sc==='global'?`<span class="badge badge-gray" style="font-size:10px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${cli.color};margin-right:4px;vertical-align:middle"></span>${cli.name}</span>`:''}</div>
          <div class="prod-card-meta"><span>SKU <b>${hlMark(p.sku||'—',sc!=='produto'?q:'')}</b></span><span>Margem ${avgM.toFixed(1)}%</span><span>${p.fabricacao?'🔨':'🛒'} ${p.fabricacao?'Fabricação':'Revenda'}</span>${pH}${kH}</div>
          ${lk}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0"><button class="btn-icon" onclick="event.stopPropagation();openEditProd('${p.id}','${cli.id}')">✏️</button><span style="color:var(--text3);font-size:12px">${ST.open['s_'+p.id]?'▲':'▼'}</span></div>
    </div>
    <div class="prod-card-body ${ST.open['s_'+p.id]?'open':''}">
      <div class="table-scroll"><table class="data-table"><thead><tr><th>Plataforma</th><th>Kit</th><th>Peso</th><th>Preço</th><th>Custo</th><th>Total Taxas</th><th>Frete ML</th><th>Lucro</th><th>R$/peça</th><th>Margem</th></tr></thead><tbody>${rows}</tbody></table></div>
    </div></div>`;
  }).join('');
}

function renderDash(c){
  const allFull=allRes(c);
  if(!allFull.length)return`<div class="empty"><div style="font-size:32px;opacity:.3;margin-bottom:12px">📊</div><div style="font-size:13px;font-weight:500;color:var(--text2)">Sem dados</div></div>`;
  const all=applyFilter(allFull);
  const total=allFull.length,verm=allFull.filter(x=>x.cor==='r').length,grn=allFull.filter(x=>x.cor==='g').length;
  const avgM=allFull.reduce((s,x)=>s+x.r.margem,0)/allFull.length;
  const prej=allFull.filter(x=>x.r.lucro<0);
  // Agrupar prejuízos por produto
  const prejPorProd={};for(const x of prej){const id=x.p.id;if(!prejPorProd[id])prejPorProd[id]={p:x.p,items:[]};prejPorProd[id].items.push(x);}
  return`${renderFilterBar(c,'dash')}
  <div class="kpi-grid">
    <div class="kpi ${verm>0?'danger':'success'}"><div class="kpi-label">Combinações em prejuízo</div><div class="kpi-val">${verm}</div><div class="kpi-sub">de ${total} combinações</div></div>
    <div class="kpi ${avgM<5?'warn':avgM>=10?'success':''}"><div class="kpi-label">Margem média</div><div class="kpi-val">${avgM.toFixed(1)}%</div><div class="kpi-sub">sobre preço de venda</div></div>
    <div class="kpi ${grn<total/2?'warn':'success'}"><div class="kpi-label">No verde</div><div class="kpi-val">${grn}</div><div class="kpi-sub">${Math.round(grn/total*100)}% do total</div></div>
    <div class="kpi"><div class="kpi-label">Produtos</div><div class="kpi-val">${c.produtos.length}</div><div class="kpi-sub">${[...new Set(allFull.map(x=>x.pl))].length} plataformas</div></div>
  </div>
  <div class="sec"><div class="sec-head"><div class="sec-title">Todos os produtos ${all.length!==allFull.length?`<span class="badge badge-gray" style="margin-left:6px">${all.length} filtrados</span>`:''}</div><div class="sec-line"></div></div>
    <div class="table-scroll"><table class="data-table">
      <thead><tr><th></th><th>SKU</th><th>Produto</th><th>Plataforma</th><th>Kit</th><th>Preço</th><th>Custo</th><th>Total Taxas</th><th>Lucro R$</th><th>R$/peça</th><th>Margem %</th></tr></thead>
      <tbody>${all.map(x=>{const po=PLATS.find(p=>p.id===x.pl);
        const tipContent=x.r.percDetail&&x.r.fixaDetail?
          [...x.r.percDetail,...x.r.fixaDetail].filter(d=>d.val>0).map(d=>{
            const isPerc=x.r.percDetail.includes(d);
            return`<div class="tip-row"><span>${d.n} ${isPerc?`(${d.v.toFixed(1)}%)`:''}</span><span>R$${d.val.toFixed(2)}</span></div>`;
          }).join('')+`<div class="tip-row"><span>Total</span><span>R$${x.r.tax.toFixed(2)}</span></div>`:'';
        return`<tr><td>${x.p.foto_url?`<img src="${x.p.foto_url}" class="prod-foto"/>`:`<div class="prod-foto-ph">👗</div>`}</td><td class="mono" style="color:var(--text3)">${x.p.sku||'—'}</td><td style="font-weight:600">${x.p.nome}</td><td><span class="chip ${po?.cls}">${po?.label||x.pl}</span></td><td class="mono">K${x.k.qty}</td><td class="mono">R$${x.r.preco.toFixed(2)}</td><td class="mono">R$${x.r.custo.toFixed(2)}</td><td><div class="tip-wrap" onmouseenter="positionTip(event)"><span class="mono" style="color:var(--text3);border-bottom:1px dashed var(--text3)">R$${x.r.tax.toFixed(2)}</span><div class="tip">${tipContent}</div></div></td><td><span class="lv lv-${x.cor}">R$${x.r.lucro.toFixed(2)}</span></td><td class="mono" style="color:var(--text3)">R$${(x.r.lucro/x.k.qty).toFixed(2)}</td><td><span class="lv lv-${x.cor}">${x.r.margem.toFixed(1)}%</span></td></tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>
  ${prej.length?`<div class="sec"><div class="sec-head"><div class="sec-title" style="color:var(--danger)">⚠️ Produtos com prejuízo (${Object.keys(prejPorProd).length})</div><div class="sec-line"></div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">
      ${Object.values(prejPorProd).map(({p,items})=>{
        const piorLucro=Math.min(...items.map(x=>x.r.lucro));
        return`<div style="background:#fff5f5;border:1px solid #fca5a5;border-radius:var(--r-lg);padding:14px">
          <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
            ${p.foto_url?`<img src="${p.foto_url}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0"/>`:`<div style="width:40px;height:40px;border-radius:6px;background:#fca5a5;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">⚠️</div>`}
            <div>
              <div style="font-size:13px;font-weight:700;color:#7f1d1d">${p.nome}</div>
              <div style="font-size:11px;color:#b91c1c;margin-top:2px">SKU ${p.sku||'—'} · ${items.length} combinação${items.length>1?'ões':''} em prejuízo</div>
            </div>
          </div>
          ${items.map(x=>{const po=PLATS.find(pl=>pl.id===x.pl);return`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:#fee2e2;border-radius:6px;margin-bottom:4px;font-size:11px">
            <div><span class="chip chip-${x.pl.includes('shopee')?'shopee':x.pl.includes('ml')?'ml':x.pl.includes('shein')?'shein':'tiktok'}" style="font-size:10px">${po?.label||x.pl}</span> K${x.k.qty}</div>
            <div style="display:flex;gap:8px;align-items:center">
              <span style="color:var(--text3)">R$${x.r.preco.toFixed(2)}</span>
              <span style="font-weight:700;color:#b91c1c">−R$${Math.abs(x.r.lucro).toFixed(2)}</span>
            </div>
          </div>`;}).join('')}
          <div style="margin-top:8px;padding-top:8px;border-top:1px solid #fca5a5;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:11px;color:#b91c1c">Pior cenário</span>
            <span style="font-size:14px;font-weight:700;font-family:var(--mono);color:#b91c1c">−R$${Math.abs(piorLucro).toFixed(2)}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`:''}`;
}

function renderProdutos(c){
  return`<div class="sec" style="margin-bottom:0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="sec-title">Produtos cadastrados</div>
      <button class="btn btn-primary" onclick="openNewProd()">+ Novo produto</button>
    </div>
    ${renderFilterBar(c,'prod')}
    ${!applyFilter(c.produtos.map(p=>({p,pl:'',k:{},r:null,cor:null}))).length?`<div class="empty"><div style="font-size:28px;opacity:.3;margin-bottom:10px">📦</div><div style="font-size:13px;font-weight:500">Nenhum produto encontrado</div></div>`
    :applyFilter(c.produtos.map(p=>({p,pl:'',k:{},r:null,cor:null}))).map(({p})=>{

              <div class="prod-card-meta">${(p.plataformas||[]).map(pl=>{const po=PLATS.find(x=>x.id===pl);return po?`<span class="chip ${po.cls}">${po.label}</span>`:''}).join('')}${(p.kits||[]).map(k=>`<span class="chip chip-kit">K${k.qty}</span>`).join('')}${p.fabricacao?'🔨 Fabricação':'🛒 Revenda'}</div>
            </div>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button class="btn-icon" title="Histórico de alterações" onclick="event.stopPropagation();openHistorico('${p.id}','${c.id}')">🕒</button>
            <button class="btn-icon" onclick="event.stopPropagation();openEditProd('${p.id}','${c.id}')">✏️</button>
            <button class="btn-icon danger" onclick="event.stopPropagation();confirmDelProd('${p.id}')">🗑️</button>
            <span style="color:var(--text3);font-size:12px;margin-left:4px">${ST.open['p_'+p.id]?'▲':'▼'}</span>
          </div>
        </div>
        <div class="prod-card-body ${ST.open['p_'+p.id]?'open':''}">
          ${(()=>{
            const allRows=[];
            for(const pl of(p.plataformas||[]))for(const k of(p.kits||[])){
              const r2=calcR(k.precos?.[pl],k.custos?.[pl],pl,c.taxas,k.peso_kg||0,k.qty);
              if(r2) allRows.push({pl,k,r2});
            }
            const bestLucro=allRows.length?Math.max(...allRows.map(x=>x.r2.lucro)):-Infinity;
            const worstLucro=allRows.length&&allRows.some(x=>x.r2.lucro<0)?Math.min(...allRows.filter(x=>x.r2.lucro<0).map(x=>x.r2.lucro)):Infinity;
            const platAtiva=ST.open['platfilt_'+p.id]||'';

            // Mini filtro de plataforma dentro do produto
            const filtroHtml=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center">

              ${platsDisponiveis.map(pl=>{const po=PLATS.find(x=>x.id===pl);return`<button onclick="ST.open['platfilt_${p.id}']='${pl}';renderTab()" style="padding:3px 10px;font-size:11px;border-radius:20px;border:1px solid ${platAtiva===pl?'var(--text)':'var(--border)'};background:${platAtiva===pl?'var(--text)':'transparent'};color:${platAtiva===pl?'#fff':'var(--text2)'};cursor:pointer;font-family:var(--font)">${po?.label||pl}</button>`;}).join('')}

            return filtroHtml + platsVisiveis.map(pl=>{

                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap">

                    const lucroColor=co2==='g'?'var(--success)':co2==='a'?'var(--warn)':co2==='l'?'var(--orange)':'var(--danger)';
                    return`<div style="min-width:160px;flex:1;max-width:220px;border:2px solid ${borderColor};border-radius:var(--r-lg);overflow:hidden;background:var(--surface)">
                      <div style="background:${headerBg};padding:8px 12px;border-bottom:1px solid ${borderColor};display:flex;align-items:center;justify-content:space-between">

                        <div style="display:flex;gap:4px;align-items:center">
                          ${isBest?'<span style="font-size:9px;background:#4ade80;color:#14532d;padding:1px 6px;border-radius:20px;font-weight:700">⬆ MELHOR</span>':''}
                          ${isWorst?'<span style="font-size:9px;background:#fca5a5;color:#7f1d1d;padding:1px 6px;border-radius:20px;font-weight:700">⬇ PIOR</span>':''}

                        </div>
                      </div>
                      <div style="padding:10px 12px;display:flex;flex-direction:column;gap:3px;font-size:11px">
                        <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)">
                          <span style="color:var(--text2)">Preço de Venda</span>
                          <span style="font-family:var(--mono);font-weight:600">R$${r2.preco.toFixed(2)}</span>
                        </div>
                        <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)">
                          <span style="color:var(--text2)">Custo de Compra</span>
                          <span style="font-family:var(--mono);font-weight:600;color:var(--danger)">R$${r2.custo.toFixed(2)}</span>
                        </div>
                        <div style="height:3px"></div>
                        ${r2.percDetail.map(d=>`<div style="display:flex;justify-content:space-between;padding:2px 0"><span style="color:var(--text3)">${d.n} <span style="font-size:9px">(${d.v.toFixed(1)}%)</span></span><span style="font-family:var(--mono);color:var(--text3)">R$${d.val.toFixed(2)}</span></div>`).join('')}
                        ${r2.fixaDetail.map(d=>`<div style="display:flex;justify-content:space-between;padding:2px 0"><span style="color:var(--text3)">${d.n}</span><span style="font-family:var(--mono);color:var(--text3)">R$${d.val.toFixed(2)}</span></div>`).join('')}

function updateCalc(){
  const c=gc();if(!c)return;
  const platSel=ST.calc.plat||'shopee';
  const preco=parseFloat(document.getElementById('calc-preco')?.value)||0;
  const custo=parseFloat(document.getElementById('calc-custo')?.value)||0;
  const peso=parseFloat(document.getElementById('calc-peso')?.value)||parseFloat(ST.calc.peso)||0;
  const margem=parseFloat(document.getElementById('calc-margem')?.value)||0;
  const resEl=document.getElementById('calc-res');
  const sugEl=document.getElementById('calc-sug');
  if(!resEl)return;
  // Sugestão
  if(sugEl&&custo>0){
    const t=c.taxas[platSel];
    function alvo(ma){
      let p=custo*2;
      for(let i=0;i<80;i++){
        const tp=platSel==='shopee'?shopeeComissao(p):t.perc.reduce((s,r)=>s+(r.v||0),0)/100;
        const tfE=platSel==='shopee'?t.fixas.filter(r=>!isTaxaFixaShopee(r.n)).reduce((s,r)=>s+(r.v||0),0):0;
        const tf=platSel==='shopee'?shopeeTaxaFixa(p)+tfE:t.fixas.reduce((s,r)=>s+(r.v||0),0);
        const fr=(platSel==='ml_classico'||platSel==='ml_premium')&&peso>0?calcFreteML(peso,p):0;
        const d=1-tp-ma;if(d<=0)break;
        const p2=(custo+tf+fr)/d;if(!isFinite(p2)||p2<=0)break;
        if(Math.abs(p2-p)<0.01)break;p=p2;
      }
      return Math.max(0,p);
    }
    const pMin=alvo(0);const pIdeal=margem>0?alvo(margem/100):null;
    sugEl.innerHTML=`<div class="sugestao-box"><div style="font-size:12px;font-weight:700;color:var(--accent-text);margin-bottom:8px">💡 Sugestão de Preço</div>
      <div class="sugestao-row"><span style="color:var(--accent-text)">Preço Mínimo (sem prejuízo)</span><span style="font-family:var(--mono);font-weight:700;color:var(--accent-text)">R$ ${pMin.toFixed(2)}</span></div>
      ${pIdeal?`<div class="sugestao-row"><span style="color:var(--accent-text)">Preço com ${margem}% de margem</span><span style="font-family:var(--mono);font-weight:700;color:var(--accent-text)">R$ ${pIdeal.toFixed(2)}</span></div>`:''}
    </div>`;
  } else if(sugEl) sugEl.innerHTML='';
  if(!preco||!custo){resEl.innerHTML=`<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">Preencha preço e custo para ver o resultado</div>`;return;}
  const r=calcR(preco,custo,platSel,c.taxas,peso);
  if(!r){resEl.innerHTML='<div style="color:var(--text3);padding:20px;text-align:center">Dados insuficientes</div>';return;}
  const cBg=r.lucro>=0?'var(--accent-bg)':'var(--danger-bg)';const cFg=r.lucro>=0?'var(--accent-text)':'var(--danger)';
  resEl.innerHTML=
    r.percDetail.map(d=>`<div class="taxa-detail-row"><span style="color:var(--text2)">${d.n}${platSel==='shopee'&&isComissaoShopee(d.n)?`<span class="shopee-badge">${preco<=79.99?'20% ≤R$79':'14% ≥R$80'}</span>`:''}</span><div style="display:flex;gap:8px;align-items:center"><span style="color:var(--text3);font-size:10px">${d.v.toFixed(2)}%</span><span class="calc-val">R$ ${d.val.toFixed(2)}</span></div></div>`).join('')+
    r.fixaDetail.map(d=>`<div class="taxa-detail-row"><span style="color:var(--text2)">${d.n}${platSel==='shopee'&&isTaxaFixaShopee(d.n)?`<span class="shopee-badge">R$${shopeeTaxaFixa(preco)} auto</span>`:''}</span><span class="calc-val">R$ ${d.val.toFixed(2)}</span></div>`).join('')+
    `<div style="height:1px;background:var(--border);margin:8px 0"></div>
    <div class="calc-row total"><span>Total de Taxas</span><span class="calc-val" style="color:var(--danger)">R$ ${r.tax.toFixed(2)}</span></div>
    <div style="height:1px;background:var(--border);margin:8px 0"></div>
    <div class="calc-row"><span>Preço de Venda</span><span class="calc-val">R$ ${r.preco.toFixed(2)}</span></div>
    <div class="calc-row"><span>Custo de Compra</span><span class="calc-val" style="color:var(--danger)">R$ ${r.custo.toFixed(2)}</span></div>
    <div class="calc-row total"><span>Total Geral (Taxas + Custo)</span><span class="calc-val" style="color:var(--danger)">R$ ${(r.tax+r.custo).toFixed(2)}</span></div>
    <div style="height:1px;background:var(--border);margin:8px 0"></div>
    <div style="background:${cBg};border-radius:var(--r);padding:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:14px;font-weight:700;color:${cFg}">LUCRO EM R$</span><span style="font-size:18px;font-weight:700;font-family:var(--mono);color:${cFg}">R$ ${r.lucro.toFixed(2)}</span></div>
      <div style="display:flex;justify-content:space-between"><span style="font-size:14px;font-weight:700;color:${cFg}">LUCRO EM %</span><span style="font-size:18px;font-weight:700;font-family:var(--mono);color:${cFg}">${r.margem.toFixed(2)}%</span></div>
    </div>`;
}

          <tbody>${regs.map(r=>{
            const po=PLATS.find(x=>x.id===r.plataforma);
            const dt=new Date(r.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
            const campoLabel=r.campo==='preco'?'Preço':r.campo==='custo'?'Custo':'Preço+Custo';
            const lucroSubiu=r.lucro_novo>r.lucro_antigo;
            return`<tr>
              <td class="mono" style="font-size:11px;color:var(--text3)">${dt}</td>
              <td><span class="chip ${po?.cls}">${po?.label||r.plataforma}</span></td>
              <td class="mono">K${r.kit_qty}</td>
              <td style="font-size:11px">${campoLabel}</td>
              <td class="mono" style="color:var(--text3)">R$${(r.valor_antigo||0).toFixed(2)}</td>
              <td class="mono" style="font-weight:600">R$${(r.valor_novo||0).toFixed(2)}</td>
              <td class="mono" style="color:var(--text3)">${r.lucro_antigo!=null?'R$'+r.lucro_antigo.toFixed(2):'—'}</td>
              <td class="mono" style="font-weight:600;color:${lucroSubiu?'var(--success)':'var(--danger)'}">${r.lucro_novo!=null?'R$'+r.lucro_novo.toFixed(2):'—'}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>`}
    </div></div>`;
  }
  if(m.type==='prod'){
    const p=m.p;const kits=p.kits||[];
    return`<div class="modal-backdrop" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header"><div class="modal-title">${m.edit?'Editar produto':'Novo produto'}</div><button class="btn-icon" onclick="closeModal()">✕</button></div>
      <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:14px">
        <div><div class="form-label" style="margin-bottom:6px">Foto</div>
          <div class="foto-upload" onclick="document.getElementById('foto-input').click()">${p.foto_url?`<img src="${p.foto_url}" style="width:100%;height:100%;object-fit:cover"/>`:`<div class="foto-txt">📷<br/>Adicionar foto</div>`}</div>
          <input type="file" id="foto-input" accept="image/*" style="display:none" onchange="handleFoto(this)"/>
          ${p.foto_url?`<button onclick="ST.modal.p.foto_url=null;render()" style="width:90px;margin-top:4px;font-size:10px;padding:3px;border:1px solid var(--border);border-radius:5px;background:transparent;cursor:pointer;color:var(--text3)">Remover</button>`:''}
        </div>
        <div style="flex:1">
          <div class="form-row"><div class="form-group"><div class="form-label">SKU</div><input class="form-input" id="p-sku" value="${p.sku||''}" placeholder="001" oninput="ST.modal.p.sku=this.value"/></div><div class="form-group"><div class="form-label">Nome</div><input class="form-input" id="p-nome" value="${p.nome||''}" placeholder="ex: Calçola Comfort" oninput="ST.modal.p.nome=this.value"/></div></div>
          <div class="form-group"><div class="form-label">Tipo</div><div class="tgl-group"><button class="tgl-btn ${!p.fabricacao?'on':''}" onclick="ST.modal.p.fabricacao=false;render()">🛒 Revenda</button><button class="tgl-btn ${p.fabricacao?'on':''}" onclick="ST.modal.p.fabricacao=true;render()">🔨 Fabricação</button></div></div>
        </div>
      </div>
      <div class="form-group"><div class="form-label">Plataformas</div><div class="plat-checks">${PLATS.map(pl=>`<div class="plat-cb ${(p.plataformas||[]).includes(pl.id)?'on':''}" onclick="togPlat('${pl.id}')">✓ ${pl.label}</div>`).join('')}</div></div>
      <div class="form-group"><div class="form-label">Links dos anúncios</div>
        <div style="display:flex;flex-direction:column;gap:6px">${PLATS.map(pl=>`<div style="display:flex;align-items:center;gap:8px"><span class="chip ${pl.cls}" style="width:90px;justify-content:center">${pl.label}</span><input class="form-input" id="link-${pl.id}" style="flex:1" placeholder="URL na ${pl.label}" value="${(p.links&&p.links[pl.id])||''}" oninput="if(!ST.modal.p.links)ST.modal.p.links={};ST.modal.p.links['${pl.id}']=this.value"/></div>`).join('')}</div>
      </div>
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:13px;font-weight:600">Kits e preços</div><button class="btn btn-outline" style="font-size:11px;padding:5px 10px" onclick="addKit()">+ Kit</button></div>
      <div id="kits-c">${kits.length===0?`<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">Nenhum kit adicionado</div>`:kits.map((k,i)=>renderKitBlock(k,i,p.plataformas||[])).join('')}</div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="save-btn" onclick="saveProduto()">${m.edit?'Salvar':'Cadastrar'}</button></div>
    </div></div>`;
  }
  if(m.type==='del')return`<div class="modal-backdrop" onclick="closeModal(event)"><div class="modal" style="max-width:400px" onclick="event.stopPropagation()"><div class="modal-header"><div class="modal-title">Excluir produto</div><button class="btn-icon" onclick="closeModal()">✕</button></div><p style="font-size:13px;color:var(--text2);margin-bottom:18px">Tem certeza que deseja excluir <b>${m.nome}</b>?</p><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn" style="background:var(--danger);color:#fff;border-color:var(--danger)" onclick="execDelProd()">Excluir</button></div></div></div>`;
  return'';
}
function renderKitBlock(k,i,plats){
  const hasML=plats.some(pl=>pl==='ml_classico'||pl==='ml_premium');
  return`<div class="kit-block"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
    <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;flex-wrap:wrap">
      Kit <input type="number" class="form-input" style="width:65px" value="${k.qty||''}" min="1" placeholder="qtd" onchange="ST.modal.p.kits[${i}].qty=parseInt(this.value)||null"/> peças
      ${hasML?`<span style="font-size:11px;color:var(--text3)">Peso ML:</span><input type="number" class="form-input" style="width:70px" value="${k.peso_kg||''}" min="0" step="0.1" placeholder="0.0" onchange="ST.modal.p.kits[${i}].peso_kg=parseFloat(this.value)||0"/> kg`:''}
    </div>
    <button class="btn-icon danger" onclick="rmKit(${i})">🗑️</button>
  </div>
  ${plats.length===0?`<div style="font-size:11px;color:var(--text3);text-align:center">Selecione plataformas primeiro</div>`:`
    <div style="display:grid;grid-template-columns:70px repeat(${plats.length},1fr);gap:5px;align-items:center;font-size:11px">
      <div></div>${plats.map(pl=>{const po=PLATS.find(x=>x.id===pl);return`<div style="text-align:center;color:var(--text3);font-weight:600">${po?.label||pl}</div>`;}).join('')}
      <div style="color:var(--text3);font-weight:500">Preço</div>${plats.map(pl=>`<input type="number" class="form-input" style="font-size:11px;padding:5px" placeholder="0.00" step="0.01" data-kit="${i}" data-plat="${pl}" data-tipo="precos" value="${k.precos?.[pl]||''}" oninput="onKitInput(${i},'precos','${pl}',this.value)" onblur="formatMoneyInput(this)"/>`).join('')}
      <div style="color:var(--text3);font-weight:500">Custo</div>${plats.map(pl=>`<input type="number" class="form-input" style="font-size:11px;padding:5px" placeholder="0.00" step="0.01" data-kit="${i}" data-plat="${pl}" data-tipo="custos" value="${k.custos?.[pl]||''}" oninput="onKitInput(${i},'custos','${pl}',this.value)" onblur="formatMoneyInput(this)"/>`).join('')}
    </div>
    <div id="kit-preview-${i}"></div>`}
  </div>`;
}

function selC(id){ST.activeId=id;ST.tab='busca';ST.open={};ST.search={q:'',scope:'todos'};render();}
function setTab(t){ST.tab=t;render();}
function togOpen(id){ST.open[id]=!ST.open[id];
  const el=document.getElementById('search-results');
  if(el&&ST.tab==='busca'){updateSearch();return;}
  renderTab();
}
function openNewClient(){ST.modal={type:'nc'};render();}
async function saveNewClient(){
  const name=document.getElementById('nc-n')?.value?.trim();if(!name)return;
  const color=COLORS[ST.clients.length%COLORS.length];
  const{data,error}=await sb.from('prec_clients').insert({name,color,taxas:mkTaxas(),regra_tipo:'peca',regra_t1:1.20,regra_t2:1.50,regra_t3:1.80}).select().single();
  if(error){toast('Erro ao criar cliente','error');return;}
  const nc={...data,produtos:[],taxas:data.taxas};ST.clients.push(nc);ST.activeId=nc.id;ST.modal=null;toast('Cliente criado!');render();
}
function openNewProd(){ST.modal={type:'prod',edit:false,clientId:ST.activeId,p:{sku:'',nome:'',fabricacao:false,plataformas:[],kits:[],foto_url:null,links:{}}};render();}
function openEditProd(pid,cid){
  const cli=ST.clients.find(c=>String(c.id)===String(cid))||gc();
  const p=cli?.produtos?.find(x=>String(x.id)===String(pid));if(!p)return;
  ST.modal={type:'prod',edit:true,clientId:cli.id,p:JSON.parse(JSON.stringify(p)),snapshot:JSON.parse(JSON.stringify(p))};render();
}
async function openHistorico(pid,cid){
  const cli=ST.clients.find(c=>String(c.id)===String(cid))||gc();
  const p=cli?.produtos?.find(x=>String(x.id)===String(pid));if(!p)return;
  ST.modal={type:'historico',nome:p.nome,sku:p.sku,productId:pid,registros:[],loading:true};render();
  const{data,error}=await sb.from('prec_historico').select('*').eq('product_id',pid).order('created_at',{ascending:false});
  if(error){console.error('Erro ao buscar histórico:',error);toast('Erro ao carregar histórico','error');}
  if(ST.modal&&ST.modal.type==='historico'){ST.modal.registros=data||[];ST.modal.loading=false;render();}
}
function exportHistoricoExcel(){
  const m=ST.modal;if(!m||!m.registros||!m.registros.length){toast('Nenhum dado para exportar','error');return;}
  const rows=m.registros.map(r=>{
    const po=PLATS.find(x=>x.id===r.plataforma);
    return{
      'Data':new Date(r.created_at).toLocaleString('pt-BR'),
      'Produto':m.nome,
      'SKU':m.sku||'',
      'Plataforma':po?.label||r.plataforma,
      'Kit':r.kit_qty,
      'Campo Alterado':r.campo==='preco'?'Preço':r.campo==='custo'?'Custo':'Preço e Custo',
      'Valor Antes (R$)':r.valor_antigo,
      'Valor Depois (R$)':r.valor_novo,
      'Lucro Antes (R$)':r.lucro_antigo,
      'Lucro Depois (R$)':r.lucro_novo,
      'Margem Antes (%)':r.margem_antiga,
      'Margem Depois (%)':r.margem_nova,
    };
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:18},{wch:25},{wch:10},{wch:14},{wch:6},{wch:16},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Histórico');
  XLSX.writeFile(wb,`Historico_${(m.nome||'produto').replace(/[^a-z0-9]/gi,'_')}.xlsx`);
  toast('Relatório exportado!');
}
function confirmDelProd(pid){const p=gc()?.produtos?.find(x=>String(x.id)===String(pid));ST.modal={type:'del',pid,nome:p?.nome||'produto'};render();}
async function execDelProd(){
  const pid=ST.modal.pid;await deleteProduct(pid);
  const c=gc();if(c)c.produtos=c.produtos.filter(x=>String(x.id)!==String(pid));
  ST.modal=null;toast('Produto excluído');render();
}
function togPlat(pl){const p=ST.modal.p;const idx=(p.plataformas||[]).indexOf(pl);if(idx>=0)p.plataformas.splice(idx,1);else p.plataformas.push(pl);render();}
function addKit(){ST.modal.p.kits.push({qty:null,precos:{},custos:{},peso_kg:0});render();}
function rmKit(i){ST.modal.p.kits.splice(i,1);render();}
async function saveProduto(){
  const m=ST.modal;const p=m.p;
  p.sku=document.getElementById('p-sku')?.value?.trim();
  p.nome=document.getElementById('p-nome')?.value?.trim();
  if(!p.nome){toast('Informe o nome do produto','error');return;}
  if(!p.links)p.links={};
  PLATS.forEach(pl=>{const el=document.getElementById('link-'+pl.id);if(el)p.links[pl.id]=el.value.trim()||null;});
  // Ler preços e custos diretamente dos inputs do DOM para não perder nenhuma edição
  const kitsEl=document.getElementById('kits-c');
  if(kitsEl){
    kitsEl.querySelectorAll('input[type="number"]').forEach(el=>{
      const ki=el.dataset?.kit;const pl=el.dataset?.plat;const tp=el.dataset?.tipo;
      if(ki===undefined||!pl||!tp) return;
      const i=parseInt(ki);if(!p.kits[i]) return;
      if(!p.kits[i][tp]) p.kits[i][tp]={};
      p.kits[i][tp][pl]=parseFloat(el.value)||null;
    });
  }
  const btn=document.getElementById('save-btn');if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  const cli=ST.clients.find(c=>String(c.id)===String(m.clientId));
  try{
    await saveProduct(p,cli.id,m.edit?m.snapshot:null);
  }catch(err){
    // NUNCA fechar o modal ou mostrar sucesso se o salvamento falhou
    if(btn){btn.disabled=false;btn.textContent=m.edit?'Salvar':'Cadastrar';}
    toast('⚠️ ERRO ao salvar: '+(err.message||'falha desconhecida')+'. Tente novamente!','error');
    return;
  }
  if(m.edit){const idx=cli.produtos.findIndex(x=>String(x.id)===String(p.id));if(idx>=0)cli.produtos[idx]=p;else cli.produtos.push(p);}
  else cli.produtos.push(p);
  ST.modal=null;toast(m.edit?'✅ Produto atualizado e salvo no banco!':'✅ Produto cadastrado e salvo no banco!');render();
}
function updTaxa(pl,tipo,i,v){gc().taxas[pl][tipo][i].v=parseFloat(v)||0;}
function updTaxaNome(pl,tipo,i,v){gc().taxas[pl][tipo][i].n=v;}
function rmTaxa(pl,tipo,i){gc().taxas[pl][tipo].splice(i,1);renderTab();}
function addTaxa(pl,tipo){const id=tipo==='perc'?`an-${pl}`:`af-${pl}`;const el=document.getElementById(id);const name=el?.value?.trim();if(!name)return;gc().taxas[pl][tipo].push({n:name,v:0});el.value='';renderTab();}
async function saveTaxas(){const c=gc();const{error}=await sb.from('prec_clients').update({taxas:c.taxas}).eq('id',c.id);if(error){console.error('Erro ao salvar taxas:',error);toast('⚠️ ERRO ao salvar taxas: '+error.message,'error');return;}toast('✅ Taxas salvas no banco!');}
function setRegraTipo(t){gc().regra_tipo=t;renderTab();}
function updRegra(f,v){gc()[f]=parseFloat(v)||0;renderTab();}
async function saveConfig(){const c=gc();const{error}=await sb.from('prec_clients').update({regra_tipo:c.regra_tipo,regra_t1:c.regra_t1,regra_t2:c.regra_t2,regra_t3:c.regra_t3}).eq('id',c.id);if(error){console.error('Erro ao salvar config:',error);toast('⚠️ ERRO ao salvar: '+error.message,'error');return;}toast('✅ Configurações salvas no banco!');}
function closeModal(e){
  if(e&&e.target!==e.currentTarget)return;
  if(ST.modal&&ST.modal.type==='prod'){
    if(!confirm('Você tem alterações não salvas. Deseja realmente fechar sem salvar?'))return;
  }
  ST.modal=null;render();
}
async function handleFoto(input){
  const file=input.files[0];if(!file)return;
  const ext=file.name.split('.').pop();const path=`produtos/${Date.now()}.${ext}`;
  const{data,error}=await sb.storage.from('product-images').upload(path,file,{upsert:true});
  if(error){toast('Erro ao enviar foto','error');return;}
  const{data:{publicUrl}}=sb.storage.from('product-images').getPublicUrl(path);
  ST.modal.p.foto_url=publicUrl;render();
}
function formatMoneyInput(el){
  const v=parseFloat(el.value);
  if(!isNaN(v)&&v>=0) el.value=v.toFixed(2);
}
function onKitInput(kitIdx, field, plat, val){
  if(!ST.modal?.p) return;
  const k=ST.modal.p.kits[kitIdx];if(!k) return;
  if(!k[field]) k[field]={};
  k[field][plat]=parseFloat(val)||null;
  // Atualizar só o preview de lucro sem re-renderizar o modal
  updateKitPreviewInline(kitIdx);
}

function updateKitPreviewInline(kitIdx){
  const c=gc();if(!c||!ST.modal?.p) return;
  const k=ST.modal.p.kits[kitIdx];if(!k) return;
  const plats=ST.modal.p.plataformas||[];
  const previewEl=document.getElementById('kit-preview-'+kitIdx);
  if(!previewEl) return;
  const rows=plats.map(pl=>{
    const preco=k.precos?.[pl];const custo=k.custos?.[pl];
    if(!preco||!custo) return null;
    const r=calcR(preco,custo,pl,c.taxas,k.peso_kg||0,k.qty||1);
    if(!r) return null;
    const po=PLATS.find(x=>x.id===pl);
    const co=cor(r,k.qty||1,c);
    const color=co==='g'?'var(--success)':co==='a'?'var(--warn)':co==='l'?'var(--orange)':'var(--danger)';
    const bg=co==='g'?'var(--success-bg)':co==='a'?'var(--warn-bg)':co==='l'?'var(--orange-bg)':'var(--danger-bg)';
    return`<div class="lucro-preview" style="background:${bg};border-color:${color};flex:1;min-width:100px">
      <div style="font-size:10px;opacity:.8;margin-bottom:3px">${po?.label||pl}</div>
      <div style="font-weight:700;font-family:var(--mono);color:${color}">R$ ${r.lucro.toFixed(2)}</div>
      <div style="font-size:10px;opacity:.8;color:${color}">${r.margem.toFixed(1)}% · R$${(r.lucro/(k.qty||1)).toFixed(2)}/pç</div>
    </div>`;
  }).filter(Boolean);
  previewEl.innerHTML=rows.length?`<div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)">
    <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Lucro calculado</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${rows.join('')}</div>
  </div>`:'';
}

function updateKitPreview(){
  // Mantido para compatibilidade — atualiza todos os previews
  if(!ST.modal?.p) return;
  ST.modal.p.kits.forEach((_,i)=>updateKitPreviewInline(i));
}
function onCalcProd(id){
  ST.calc.prodId=id;ST.calc.kit=null;ST.calc.preco='';ST.calc.custo='';ST.calc.peso='';
  const cli=gc();const p=cli.produtos.find(x=>String(x.id)===id);
  if(p&&p.kits.length===1){ST.calc.kit=p.kits[0].qty;onCalcKit(p.kits[0].qty);return;}
  renderTab();
}
function onCalcKit(qty){
  qty=parseInt(qty)||null;ST.calc.kit=qty;
  const cli=gc();const p=cli.produtos.find(x=>String(x.id)===String(ST.calc.prodId));
  const k=p?.kits?.find(x=>x.qty===qty);
  if(k){const pl=ST.calc.plat;if(k.precos?.[pl])ST.calc.preco=String(k.precos[pl]);if(k.custos?.[pl])ST.calc.custo=String(k.custos[pl]);if(k.peso_kg)ST.calc.peso=String(k.peso_kg);}
  renderTab();
}

loadAll();

// Seleção de linha ao clicar — igual Excel
document.addEventListener('click',function(e){
  const tr=e.target.closest('.data-table tbody tr');
  if(!tr) return;
  const table=tr.closest('table');
  const wasSelected=tr.classList.contains('selected');
  table.querySelectorAll('tbody tr.selected').forEach(r=>r.classList.remove('selected'));
  if(!wasSelected) tr.classList.add('selected');
});
</script>
</body>
</html>
