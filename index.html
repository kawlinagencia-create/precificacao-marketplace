<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Precificação — Agência</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f7f7f5;--surface:#ffffff;--surface2:#f0f0ec;--border:#e5e5e0;--border2:#d0d0c8;
  --text:#1a1a18;--text2:#6b6b65;--text3:#9b9b94;
  --accent:#2d6a4f;--accent-bg:#e8f5ee;--accent-text:#1b4332;
  --danger:#c1121f;--danger-bg:#fee2e2;--warn:#d97706;--warn-bg:#fef3c7;
  --orange:#c05621;--orange-bg:#fff0e6;--success:#166534;--success-bg:#dcfce7;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:8px;--r-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-logo-title{font-size:13px;font-weight:600;color:var(--text)}
.sb-logo-sub{font-size:11px;color:var(--text3);margin-top:1px}
.sb-section{padding:10px 8px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.sb-list{flex:1;overflow-y:auto;padding:4px 8px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-count{margin-left:auto;font-size:10px;background:var(--surface2);color:var(--text3);padding:1px 6px;border-radius:20px}
.sb-item.active .sb-count{background:var(--accent);color:#fff}
.sb-footer{padding:8px;border-top:1px solid var(--border)}
.sb-add-btn{display:flex;align-items:center;gap:6px;width:100%;padding:8px 10px;border-radius:var(--r);border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.sb-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;height:52px;gap:12px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px;flex:1}
.topbar-title{font-size:15px;font-weight:600}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:var(--accent-bg);color:var(--accent-text)}
.badge-gray{background:var(--surface2);color:var(--text3)}
.tabs{display:flex;gap:1px;background:var(--surface2);padding:3px;border-radius:var(--r);border:1px solid var(--border)}
.tab-btn{padding:5px 11px;font-size:12px;border-radius:6px;cursor:pointer;color:var(--text2);border:none;background:transparent;font-family:var(--font);transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.content{flex:1;overflow-y:auto;padding:20px}
/* search */
.search-wrap{position:relative;margin-bottom:12px}
.search-input{width:100%;padding:9px 36px 9px 36px;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface);font-size:13px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-icon-left{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:4px}
.scope-row{display:flex;gap:6px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.scope-btn{padding:4px 10px;font-size:11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .15s}
.scope-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
/* product cards */
.prod-card{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:8px;background:var(--surface)}
.prod-card-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:12px}
.prod-card-head:hover{background:var(--surface2)}
.prod-card-name{font-size:13px;font-weight:600}
.prod-card-meta{font-size:11px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.prod-card-body{border-top:1px solid var(--border);padding:14px 16px;background:var(--surface2);display:none}
.prod-card-body.open{display:block}
/* tables */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;padding:7px 10px;color:var(--text3);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--surface);white-space:nowrap}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--surface2)}
.data-table td.mono{font-family:var(--mono);font-size:11px}
/* chips */
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;margin:1px;white-space:nowrap}
.chip-shopee{background:#fee2d5;color:#9d2a0a}
.chip-shein{background:#d1fae5;color:#065f46}
.chip-ml{background:#fef9c3;color:#713f12}
.chip-tiktok{background:#f1f5f9;color:#334155}
.chip-kit{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
/* lucro */
.lv{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap;font-family:var(--mono)}
.lv-g{background:var(--success-bg);color:var(--success)}
.lv-a{background:var(--warn-bg);color:var(--warn)}
.lv-l{background:var(--orange-bg);color:var(--orange)}
.lv-r{background:var(--danger-bg);color:var(--danger)}
mark{background:#fef08a;border-radius:2px;padding:0 1px;color:inherit}
/* kpi */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500}
.kpi-val{font-size:22px;font-weight:600;font-family:var(--mono)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
.kpi.danger .kpi-val{color:var(--danger)}
.kpi.success .kpi-val{color:var(--success)}
.kpi.warn .kpi-val{color:var(--warn)}
/* bars */
.bar-wrap{display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:11px}
.bar-label{width:150px;flex-shrink:0;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:12px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.bar-val{width:70px;text-align:right;font-weight:600;font-family:var(--mono);font-size:11px}
.sec{margin-bottom:22px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-title{font-size:13px;font-weight:600}
.sec-line{flex:1;height:1px;background:var(--border)}
/* alert */
.alert-list{display:flex;flex-direction:column;gap:6px}
.alert-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--r-lg);border:1px solid}
.alert-item.red{border-color:#fca5a5;background:#fff5f5}
.alert-item.orange{border-color:#fdba74;background:#fff7ed}
.alert-item.yellow{border-color:#fcd34d;background:#fffbeb}
/* taxas */
.taxas-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.taxa-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px}
.taxa-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.taxa-row:last-child{border-bottom:none}
.taxa-input{width:65px;padding:3px 7px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);text-align:right;font-family:var(--mono);outline:none}
.taxa-name-input{flex:1;padding:3px 7px;font-size:12px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--text);font-family:var(--font);outline:none}
.taxa-name-input:hover{border-color:var(--border);background:var(--surface2)}
.taxa-name-input:focus{border-color:var(--accent);background:var(--surface)}
/* calculadora */
.calc-wrap{display:grid;grid-template-columns:320px 1fr;gap:16px;max-width:900px}
.calc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px}
.calc-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.calc-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.calc-row:last-child{border-bottom:none}
.calc-row.total{font-weight:700;font-size:13px}
.calc-row.lucro-row{padding:8px 0;background:var(--accent-bg);border-radius:var(--r);margin-top:4px;padding:8px 10px}
.calc-row.danger-row{background:var(--danger-bg);border-radius:var(--r);margin-top:4px;padding:8px 10px}
.calc-val{font-family:var(--mono);font-weight:600}
.calc-input{padding:6px 10px;font-size:13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);outline:none;text-align:right;width:130px}
.calc-input:focus{border-color:var(--accent);background:var(--surface)}
.calc-select{padding:6px 10px;font-size:13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);outline:none;width:130px}
.taxa-detail-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px dashed var(--border)}
.taxa-detail-row:last-child{border-bottom:none}
.sugestao-box{background:var(--accent-bg);border-radius:var(--r);padding:12px;margin-top:10px}
.sugestao-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
/* modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);width:620px;max-width:96vw;max-height:90vh;overflow-y:auto;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:600}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
.form-input{width:100%;padding:8px 10px;font-size:13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.kit-block{background:var(--surface2);border-radius:var(--r);padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.plat-checks{display:flex;flex-wrap:wrap;gap:6px}
.plat-cb{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:12px;user-select:none;transition:all .15s;background:var(--surface)}
.plat-cb.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.tgl-group{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;width:fit-content}
.tgl-btn{padding:7px 14px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s;border-right:1px solid var(--border)}
.tgl-btn:last-child{border-right:none}
.tgl-btn.on{background:var(--text);color:#fff;font-weight:500}
.divider{height:1px;background:var(--border);margin:16px 0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;border:1px solid transparent}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{opacity:.85}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-outline:hover{background:var(--surface2)}
.btn-icon{background:transparent;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;display:flex;align-items:center;transition:all .15s}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-icon.danger:hover{color:var(--danger);background:var(--danger-bg)}
.config-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;max-width:500px}
.config-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.foto-upload{width:90px;height:90px;border-radius:var(--r-lg);border:2px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;background:var(--surface2)}
.foto-upload:hover{border-color:var(--accent)}
.foto-upload img{width:100%;height:100%;object-fit:cover}
.foto-txt{font-size:10px;color:var(--text3);text-align:center;padding:4px}
.prod-foto{width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0}
.prod-foto-ph{width:36px;height:36px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.link-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;text-decoration:none;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s}
.link-chip:hover{background:var(--accent-bg);color:var(--accent-text)}
.plat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.plat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 14px}
.plat-stat{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border)}
.plat-stat:last-child{border-bottom:none}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);gap:10px;font-size:13px}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:12px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:slideIn .2s ease}
.toast.error{background:var(--danger)}
.toast.success{background:var(--success)}
@keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.taxa-add-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.taxa-add-input{flex:1;padding:5px 8px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-family:var(--font);outline:none}
.shopee-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:20px;font-size:9px;font-weight:600;background:#fef9c3;color:#713f12;margin-left:4px}
</style>
</head>

const ML_FAIXAS=[18.99,48.99,78.99,99.99,119.99,149.99,199.99,Infinity];

function calcFreteML(pesoKg,preco){
  if(!pesoKg||pesoKg<=0||!preco||preco<=0) return 0;
  const fi=ML_FAIXAS.findIndex(f=>preco<=f);
  const linha=ML_FRETE.find(([pm])=>pesoKg<=pm)||ML_FRETE[ML_FRETE.length-1];
  return linha[1][fi>=0?fi:7]||0;
}

function shopeeComissao(preco){return preco<=79.99?0.20:0.14;}
function shopeeTaxaFixa(preco){
  if(preco<=79.99) return 4;
  if(preco<=99.99) return 16;
  if(preco<=199.99) return 20;
  if(preco<=499.99) return 26;
  return 26;
}

  const t={};
  for(const k of Object.keys(TAXA_D)) t[k]={perc:TAXA_D[k].map(r=>({...r})),fixas:TF_D[k].map(r=>({...r}))};

}

// ── CALC ────────────────────────────────────────────────────
function calcR(preco,custo,platId,taxas,pesoKg){
  if(!preco||preco<=0||!custo||custo<=0) return null;
  const t=taxas[platId];if(!t) return null;
  let totalPerc=0;
  const percDetail=[];
  for(const r of t.perc){
    let v=r.v;
    if(platId==='shopee'&&r.n==='Comissão') v=shopeeComissao(preco)*100;
    totalPerc+=v/100;
    percDetail.push({n:r.n,v,val:preco*v/100});
  }
  let totalFixa=0;
  const fixaDetail=[];
  for(const r of t.fixas){
    let v=r.v;
    if(platId==='shopee'&&r.n==='Taxa Fixa') v=shopeeTaxaFixa(preco);
    totalFixa+=v;
    fixaDetail.push({n:r.n,v,val:v});
  }
  // Frete ML automático
  let freteML=0;
  if((platId==='ml_classico'||platId==='ml_premium')&&pesoKg>0){
    freteML=calcFreteML(pesoKg,preco);
    totalFixa+=freteML;
    fixaDetail.push({n:'Frete ML (auto)',v:freteML,val:freteML});
  }
  const tax=preco*totalPerc+totalFixa;
  const lucro=preco-custo-tax;
  return{lucro,margem:preco>0?lucro/preco*100:0,tax,preco,custo,percDetail,fixaDetail,freteML};
}

function cor(r,qty,c){
  if(!r) return null;
  const val=(c.regra_tipo||'peca')==='peca'?(qty>0?r.lucro/qty:r.lucro):r.margem;
  if(val<=(c.regra_t1||1.2)) return 'r';
  if(val<=(c.regra_t2||1.5)) return 'l';
  if(val<=(c.regra_t3||1.8)) return 'a';
  return 'g';
}
function allRes(c){
  const out=[];
  for(const p of c.produtos)
    for(const pl of(p.plataformas||[]))
      for(const k of(p.kits||[])){
        const r=calcR(k.precos?.[pl],k.custos?.[pl],pl,c.taxas,k.peso_kg||0);
        if(r) out.push({p,pl,k,r,cor:cor(r,k.qty,c)});
      }
  return out;
}
function bestR(p,c){
  let best=null,bc=null;const pri={g:4,a:3,l:2,r:1};
  for(const pl of(p.plataformas||[]))for(const k of(p.kits||[])){
    const r=calcR(k.precos?.[pl],k.custos?.[pl],pl,c.taxas,k.peso_kg||0);
    if(r){const co=cor(r,k.qty,c);if(!best||(pri[co]||0)>(pri[bc]||0)){best=r;bc=co;}}
  }
  return{r:best,cor:bc};
}
function hlMark(str,q){
  if(!q||!str) return String(str||'');
  return String(str).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}
function toast(msg,type='success'){
  const wrap=document.getElementById('toasts');const el=document.createElement('div');
  el.className=`toast ${type}`;el.textContent=msg;wrap.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

function renderBusca(c){
  const q=ST.search.q.trim(),sc=ST.search.scope;

  let res=[];
  for(const cli of clis){
    for(const p of(cli.produtos||[])){
      const lq=q.toLowerCase();
      const ok=!q||(sc==='sku'&&String(p.sku||'').toLowerCase().includes(lq))||
               (sc==='produto'&&(p.nome||'').toLowerCase().includes(lq))||
               (sc!=='sku'&&sc!=='produto'&&(String(p.sku||'').toLowerCase().includes(lq)||(p.nome||'').toLowerCase().includes(lq)));
      if(ok){
        const{r,cor:co}=bestR(p,cli);
        const allR=allRes(cli).filter(x=>x.p.id===p.id);
        const avgM=allR.length?allR.reduce((s,x)=>s+x.r.margem,0)/allR.length:0;

// ── PLATAFORMAS ────────────────────────────────────────────────
function renderPlataformas(c){
  const all=allRes(c);
  if(!all.length) return`<div class="empty">Sem dados</div>`;
  const platsAtivas=[...new Set(all.map(x=>x.pl))];
  return`
    <div class="sec"><div class="sec-head"><div class="sec-title">Comparativo de plataformas</div><div class="sec-line"></div></div>
      <div class="plat-grid">${platsAtivas.map(pl=>{
        const po=PLATS.find(x=>x.id===pl);const items=all.filter(x=>x.pl===pl);
        const avgM=items.reduce((s,x)=>s+x.r.margem,0)/items.length;
        const avgL=items.reduce((s,x)=>s+x.r.lucro,0)/items.length;
        const vm=items.filter(x=>x.cor==='r').length,gn=items.filter(x=>x.cor==='g').length;
        return`<div class="plat-card">
          <div style="margin-bottom:10px"><span class="chip ${po?.cls}">${po?.label||pl}</span></div>
          ${[['Produtos',[...new Set(items.map(x=>x.p.id))].length,null],['Margem média',avgM.toFixed(1)+'%',avgM>=10?'var(--success)':avgM>=5?'var(--warn)':'var(--danger)'],['Lucro médio','R$'+avgL.toFixed(2),null],['No verde',gn,'var(--success)'],['No vermelho',vm,vm>0?'var(--danger)':null]].map(([lb,val,col])=>`
            <div class="plat-stat"><span style="color:var(--text3)">${lb}</span><span style="font-weight:600;font-family:var(--mono)${col?`;color:${col}`:''}">` +val+`</span></div>`).join('')}
        </div>`;}).join('')}
      </div>
    </div>
    <div class="sec"><div class="sec-head"><div class="sec-title">Ranking de lucro</div><div class="sec-line"></div></div>
      <div class="bar-wrap">${all.sort((a,b)=>b.r.lucro-a.r.lucro).map(x=>{
        const po=PLATS.find(p=>p.id===x.pl);
        const pct=Math.max(0,Math.min(100,(x.r.lucro/30)*100));
        const col=x.r.lucro>=0?'#166534':'#b91c1c';const bg=x.r.lucro>=0?'#dcfce7':'#fee2e2';

      }).join('')}</div>
    </div>`;
}

// ── CALCULADORA ───────────────────────────────────────────────────
function renderCalculadora(c){
  const ca=ST.calc;
  const prods=c.produtos||[];
  const platSel=ca.plat||'shopee';
  const prodSel=prods.find(p=>String(p.id)===String(ca.prodId));
  const kits=prodSel?prodSel.kits:[];
  const kitSel=kits.find(k=>k.qty===ca.kit);
  const preco=parseFloat(ca.preco)||0;
  const custo=parseFloat(ca.custo)||0;
  const margDesejada=parseFloat(ca.margem)||0;
  const peso=parseFloat(ca.peso)||0;

  // Calc result
  let result=null;
  if(preco>0&&custo>0){
    result=calcR(preco,custo,platSel,c.taxas,peso);
  }

  // Sugestão de preço
  let precoMinimo=null,precoIdeal=null;
  if(custo>0){
    const t=c.taxas[platSel];
    // Para shopee, iteramos pois comissão e taxa fixa dependem do preço
    function calcPrecoAlvo(margemAlvo){
      let p=custo*2;// chute inicial
      for(let i=0;i<50;i++){
        const tp=platSel==='shopee'?shopeeComissao(p):t.perc.reduce((s,r)=>s+(r.v||0),0)/100;
        const tf=platSel==='shopee'?shopeeTaxaFixa(p)+t.fixas.filter(r=>r.n!=='Taxa Fixa').reduce((s,r)=>s+(r.v||0),0):t.fixas.reduce((s,r)=>s+(r.v||0),0);
        const frML=(platSel==='ml_classico'||platSel==='ml_premium')&&peso>0?calcFreteML(peso,p):0;
        const p2=(custo+tf+frML+margemAlvo*p)/(1-tp+margemAlvo)||0;// margemAlvo é fração do preço
        if(Math.abs(p2-p)<0.01) break;
        p=p2;
      }
      return Math.max(0,p);
    }
    precoMinimo=calcPrecoAlvo(0);
    if(margDesejada>0) precoIdeal=calcPrecoAlvo(margDesejada/100);
  }

  const po=PLATS.find(x=>x.id===platSel);
  return`
    <div class="calc-wrap">
      <div>
        <div class="calc-card" style="margin-bottom:12px">
          <div class="calc-title">📥 Entradas</div>
          <div class="calc-row">
            <span>Plataforma</span>
            <select class="calc-select" onchange="ST.calc.plat=this.value;ST.calc.preco='';ST.calc.peso='';renderTab()">
              ${PLATS.map(pl=>`<option value="${pl.id}" ${platSel===pl.id?'selected':''}>${pl.label}</option>`).join('')}
            </select>
          </div>
          <div class="calc-row">
            <span>Produto (opcional)</span>
            <select class="calc-select" onchange="onCalcProd(this.value)">
              <option value="">— Manual —</option>
              ${prods.map(p=>`<option value="${p.id}" ${ca.prodId==p.id?'selected':''}>${p.nome}</option>`).join('')}
            </select>
          </div>
          ${prodSel?`<div class="calc-row"><span>Kit</span>
            <select class="calc-select" onchange="onCalcKit(this.value)">
              <option value="">Selecione...</option>
              ${kits.map(k=>`<option value="${k.qty}" ${ca.kit===k.qty?'selected':''}>${k.qty} peças</option>`).join('')}
            </select>
          </div>`:''}
          <div class="calc-row">
            <span>Preço de Venda (R$)</span>
            <input class="calc-input" type="number" placeholder="0,00" value="${ca.preco}" oninput="ST.calc.preco=this.value;renderTab()"/>
          </div>
          <div class="calc-row">
            <span>Custo de Compra (R$)</span>
            <input class="calc-input" type="number" placeholder="0,00" value="${ca.custo}" oninput="ST.calc.custo=this.value;renderTab()"/>
          </div>
          ${(platSel==='ml_classico'||platSel==='ml_premium')?`<div class="calc-row">
            <span>Peso do Kit (kg)</span>
            <input class="calc-input" type="number" placeholder="0,0" step="0.1" value="${ca.peso}" oninput="ST.calc.peso=this.value;renderTab()"/>
          </div>`:''}
          <div class="calc-row">
            <span>Margem Desejada (%)</span>
            <input class="calc-input" type="number" placeholder="15" value="${ca.margem}" oninput="ST.calc.margem=this.value;renderTab()"/>
          </div>
        </div>

        ${precoMinimo!==null?`<div class="sugestao-box">
          <div style="font-size:12px;font-weight:700;color:var(--accent-text);margin-bottom:8px">💡 Sugestão de Preço</div>
          <div class="sugestao-row">
            <span style="color:var(--accent-text)">Preço Mínimo (sem prejuízo)</span>
            <span style="font-family:var(--mono);font-weight:700;color:var(--accent-text)">R$ ${precoMinimo.toFixed(2)}</span>
          </div>
          ${precoIdeal?`<div class="sugestao-row">
            <span style="color:var(--accent-text)">Preço com ${margDesejada}% de margem</span>
            <span style="font-family:var(--mono);font-weight:700;color:var(--accent-text)">R$ ${precoIdeal.toFixed(2)}</span>
          </div>`:''}
        </div>`:''}
      </div>

      <div>
        <div class="calc-card">
          <div class="calc-title">📋 Detalhamento de Taxas</div>
          ${result?`
            ${result.percDetail.map(d=>`
              <div class="taxa-detail-row">
                <span style="color:var(--text2)">${d.n}${platSel==='shopee'&&d.n==='Comissão'?`<span class="shopee-badge">${preco<=79.99?'20% ≤R$79':'14% ≥R$80'}</span>`:''}</span>
                <div style="display:flex;gap:8px;align-items:center">
                  <span style="color:var(--text3);font-size:10px">${d.v.toFixed(2)}%</span>
                  <span class="calc-val">R$ ${d.val.toFixed(2)}</span>
                </div>
              </div>`).join('')}
            ${result.fixaDetail.map(d=>`
              <div class="taxa-detail-row">
                <span style="color:var(--text2)">${d.n}${platSel==='shopee'&&d.n==='Taxa Fixa'?`<span class="shopee-badge">R$${shopeeTaxaFixa(preco)} auto</span>`:''}</span>
                <span class="calc-val">R$ ${d.val.toFixed(2)}</span>
              </div>`).join('')}
            <div style="height:1px;background:var(--border);margin:8px 0"></div>
            <div class="calc-row total">
              <span>Total de Taxas</span>
              <span class="calc-val" style="color:var(--danger)">R$ ${result.tax.toFixed(2)}</span>
            </div>
            <div style="height:1px;background:var(--border);margin:8px 0"></div>
            <div class="calc-row"><span>Preço de Venda</span><span class="calc-val">R$ ${result.preco.toFixed(2)}</span></div>
            <div class="calc-row"><span>Custo de Compra</span><span class="calc-val" style="color:var(--danger)">R$ ${result.custo.toFixed(2)}</span></div>
            <div class="calc-row total"><span>Total Geral (Taxas + Custo)</span><span class="calc-val" style="color:var(--danger)">R$ ${(result.tax+result.custo).toFixed(2)}</span></div>
            <div style="height:1px;background:var(--border);margin:8px 0"></div>
            <div style="background:${result.lucro>=0?'var(--accent-bg)':'var(--danger-bg)'};border-radius:var(--r);padding:12px;margin-top:4px">
              <div style="display:flex;justify-content:space-between;margin-bottom:6px">
                <span style="font-size:14px;font-weight:700;color:${result.lucro>=0?'var(--accent-text)':'var(--danger)'}">LUCRO EM R$</span>
                <span style="font-size:18px;font-weight:700;font-family:var(--mono);color:${result.lucro>=0?'var(--accent-text)':'var(--danger)'}">R$ ${result.lucro.toFixed(2)}</span>
              </div>
              <div style="display:flex;justify-content:space-between">
                <span style="font-size:14px;font-weight:700;color:${result.lucro>=0?'var(--accent-text)':'var(--danger)'}">LUCRO EM %</span>
                <span style="font-size:18px;font-weight:700;font-family:var(--mono);color:${result.lucro>=0?'var(--accent-text)':'var(--danger)'}">${result.margem.toFixed(2)}%</span>
              </div>
            </div>
          `:`<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">Preencha preço e custo para ver o resultado</div>`}
        </div>
      </div>
    </div>`;
}

// ── MODAL ────────────────────────────────────────────────────────
function renderModal(){
  const m=ST.modal;
  if(m.type==='nc') return`
    <div class="modal-backdrop" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header"><div class="modal-title">Novo cliente</div><button class="btn-icon" onclick="closeModal()">✕</button></div>
        <div class="form-group"><div class="form-label">Nome</div><input class="form-input" id="nc-n" placeholder="ex: Maria Moda"/></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
          <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="saveNewClient()">Criar</button>
        </div>
      </div>
    </div>`;
  if(m.type==='prod'){
    const p=m.p;const kits=p.kits||[];
    return`
      <div class="modal-backdrop" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-header"><div class="modal-title">${m.edit?'Editar produto':'Novo produto'}</div><button class="btn-icon" onclick="closeModal()">✕</button></div>
          <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:14px">
            <div>
              <div class="form-label" style="margin-bottom:6px">Foto</div>
              <div class="foto-upload" onclick="document.getElementById('foto-input').click()">
                ${p.foto_url?`<img src="${p.foto_url}" style="width:100%;height:100%;object-fit:cover"/>`:`<div class="foto-txt">📷<br/>Adicionar foto</div>`}
              </div>
              <input type="file" id="foto-input" accept="image/*" style="display:none" onchange="handleFoto(this)"/>
              ${p.foto_url?`<button onclick="ST.modal.p.foto_url=null;render()" style="width:90px;margin-top:4px;font-size:10px;padding:3px;border:1px solid var(--border);border-radius:5px;background:transparent;cursor:pointer;color:var(--text3)">Remover</button>`:''}
            </div>
            <div style="flex:1">
              <div class="form-row">
                <div class="form-group"><div class="form-label">SKU</div><input class="form-input" id="p-sku" value="${p.sku||''}" placeholder="001"/></div>
                <div class="form-group"><div class="form-label">Nome do produto</div><input class="form-input" id="p-nome" value="${p.nome||''}" placeholder="ex: Calçola Comfort"/></div>
              </div>
              <div class="form-group"><div class="form-label">Tipo</div>
                <div class="tgl-group">
                  <button class="tgl-btn ${!p.fabricacao?'on':''}" onclick="ST.modal.p.fabricacao=false;render()">🛒 Revenda</button>
                  <button class="tgl-btn ${p.fabricacao?'on':''}" onclick="ST.modal.p.fabricacao=true;render()">🔨 Fabricação</button>
                </div>
              </div>
            </div>
          </div>
          <div class="form-group"><div class="form-label">Plataformas</div>
            <div class="plat-checks">${PLATS.map(pl=>`<div class="plat-cb ${(p.plataformas||[]).includes(pl.id)?'on':''}" onclick="togPlat('${pl.id}')">✓ ${pl.label}</div>`).join('')}</div>
          </div>
          <div class="form-group"><div class="form-label">Links dos anúncios</div>
            <div style="display:flex;flex-direction:column;gap:6px">
              ${PLATS.map(pl=>`<div style="display:flex;align-items:center;gap:8px">
                <span class="chip ${pl.cls}" style="width:90px;justify-content:center">${pl.label}</span>
                <input class="form-input" id="link-${pl.id}" style="flex:1" placeholder="URL do anúncio na ${pl.label}" value="${(p.links&&p.links[pl.id])||''}"/>
                ${(p.links&&p.links[pl.id])?`<a href="${p.links[pl.id]}" target="_blank" style="text-decoration:none">🔗</a>`:''}
              </div>`).join('')}
            </div>
          </div>
          <div class="divider"></div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-size:13px;font-weight:600">Kits e preços</div>
            <button class="btn btn-outline" style="font-size:11px;padding:5px 10px" onclick="addKit()">+ Kit</button>
          </div>
          <div id="kits-c">${kits.length===0?`<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">Nenhum kit adicionado</div>`:kits.map((k,i)=>renderKitBlock(k,i,p.plataformas||[])).join('')}</div>
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
            <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" id="save-btn" onclick="saveProduto()">${m.edit?'Salvar':'Cadastrar'}</button>
          </div>
        </div>
      </div>`;
  }
  if(m.type==='del') return`
    <div class="modal-backdrop" onclick="closeModal(event)">
      <div class="modal" style="max-width:400px" onclick="event.stopPropagation()">
        <div class="modal-header"><div class="modal-title">Excluir produto</div><button class="btn-icon" onclick="closeModal()">✕</button></div>
        <p style="font-size:13px;color:var(--text2);margin-bottom:18px">Tem certeza que deseja excluir <b>${m.nome}</b>?</p>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn" style="background:var(--danger);color:#fff;border-color:var(--danger)" onclick="execDelProd()">Excluir</button>
        </div>
      </div>
    </div>`;
  return'';
}
function renderKitBlock(k,i,plats){
  const hasML=plats.some(pl=>pl==='ml_classico'||pl==='ml_premium');
  return`<div class="kit-block">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;flex-wrap:wrap">
        Kit <input type="number" class="form-input" style="width:65px" value="${k.qty||''}" min="1" placeholder="qtd" onchange="ST.modal.p.kits[${i}].qty=parseInt(this.value)||null"/> peças
        ${hasML?`<span style="font-size:11px;color:var(--text3)">Peso ML:</span>
          <input type="number" class="form-input" style="width:70px" value="${k.peso_kg||''}" min="0" step="0.1" placeholder="0.0" onchange="ST.modal.p.kits[${i}].peso_kg=parseFloat(this.value)||0"/> kg`:''}
      </div>
      <button class="btn-icon danger" onclick="rmKit(${i})">🗑️</button>
    </div>
    ${plats.length===0?`<div style="font-size:11px;color:var(--text3);text-align:center">Selecione plataformas primeiro</div>`:`
      <div style="display:grid;grid-template-columns:70px repeat(${plats.length},1fr);gap:5px;align-items:center;font-size:11px">
        <div></div>${plats.map(pl=>{const po=PLATS.find(x=>x.id===pl);return`<div style="text-align:center;color:var(--text3);font-weight:600">${po?.label||pl}</div>`}).join('')}
        <div style="color:var(--text3);font-weight:500">Preço</div>${plats.map(pl=>`<input type="number" class="form-input" style="font-size:11px;padding:5px" placeholder="0.00" value="${k.precos?.[pl]||''}" onchange="ST.modal.p.kits[${i}].precos['${pl}']=parseFloat(this.value)||null"/>`).join('')}
        <div style="color:var(--text3);font-weight:500">Custo</div>${plats.map(pl=>`<input type="number" class="form-input" style="font-size:11px;padding:5px" placeholder="0.00" value="${k.custos?.[pl]||''}" onchange="ST.modal.p.kits[${i}].custos['${pl}']=parseFloat(this.value)||null"/>`).join('')}
      </div>`}
  </div>`;
}

// ── ACTIONS ──────────────────────────────────────────────────────
function selC(id){ST.activeId=id;ST.tab='busca';ST.open={};ST.search={q:'',scope:'todos'};render();}
function setTab(t){ST.tab=t;render();}
function togOpen(id){ST.open[id]=!ST.open[id];renderTab();}
function openNewClient(){ST.modal={type:'nc'};render();}
async function saveNewClient(){
  const name=document.getElementById('nc-n')?.value?.trim();if(!name)return;
  const color=COLORS[ST.clients.length%COLORS.length];
  const{data,error}=await sb.from('prec_clients').insert({name,color,taxas:mkTaxas(),regra_tipo:'peca',regra_t1:1.20,regra_t2:1.50,regra_t3:1.80}).select().single();
  if(error){toast('Erro ao criar cliente','error');return;}
  const nc={...data,produtos:[],taxas:data.taxas};
  ST.clients.push(nc);ST.activeId=nc.id;ST.modal=null;toast('Cliente criado!');render();
}
function openNewProd(){ST.modal={type:'prod',edit:false,clientId:ST.activeId,p:{sku:'',nome:'',fabricacao:false,plataformas:[],kits:[],foto_url:null,links:{}}};render();}
function openEditProd(pid,cid){
  const cli=ST.clients.find(c=>String(c.id)===String(cid))||gc();
  const p=cli?.produtos?.find(x=>String(x.id)===String(pid));if(!p)return;
  ST.modal={type:'prod',edit:true,clientId:cli.id,p:JSON.parse(JSON.stringify(p))};render();
}
function confirmDelProd(pid){const p=gc()?.produtos?.find(x=>String(x.id)===String(pid));ST.modal={type:'del',pid,nome:p?.nome||'produto'};render();}
async function execDelProd(){
  const pid=ST.modal.pid;await deleteProduct(pid);
  const c=gc();if(c)c.produtos=c.produtos.filter(x=>String(x.id)!==String(pid));
  ST.modal=null;toast('Produto excluído');render();
}
function togPlat(pl){
  const p=ST.modal.p;const idx=(p.plataformas||[]).indexOf(pl);
  if(idx>=0)p.plataformas.splice(idx,1);else p.plataformas.push(pl);render();
}
function addKit(){ST.modal.p.kits.push({qty:null,precos:{},custos:{},peso_kg:0});render();}
function rmKit(i){ST.modal.p.kits.splice(i,1);render();}
async function saveProduto(){
  const m=ST.modal;const p=m.p;
  p.sku=document.getElementById('p-sku')?.value?.trim();
  p.nome=document.getElementById('p-nome')?.value?.trim();
  if(!p.nome){toast('Informe o nome do produto','error');return;}
  if(!p.links) p.links={};
  PLATS.forEach(pl=>{const el=document.getElementById('link-'+pl.id);if(el)p.links[pl.id]=el.value.trim()||null;});
  const btn=document.getElementById('save-btn');if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  const cli=ST.clients.find(c=>String(c.id)===String(m.clientId));
  await saveProduct(p,cli.id);
  if(m.edit){const idx=cli.produtos.findIndex(x=>String(x.id)===String(p.id));if(idx>=0)cli.produtos[idx]=p;else cli.produtos.push(p);}
  else cli.produtos.push(p);
  ST.modal=null;toast(m.edit?'Produto atualizado!':'Produto cadastrado!');render();
}
function updTaxa(pl,tipo,i,v){gc().taxas[pl][tipo][i].v=parseFloat(v)||0;}
function updTaxaNome(pl,tipo,i,v){gc().taxas[pl][tipo][i].n=v;}
function rmTaxa(pl,tipo,i){gc().taxas[pl][tipo].splice(i,1);renderTab();}
function addTaxa(pl,tipo){
  const el=document.getElementById(`add-${tipo}-name-${pl}`);
  const name=el?.value?.trim();if(!name)return;
  gc().taxas[pl][tipo].push({n:name,v:0});el.value='';renderTab();
}
async function saveTaxas(){
  const c=gc();await sb.from('prec_clients').update({taxas:c.taxas}).eq('id',c.id);toast('Taxas salvas!');}
function setRegraTipo(t){gc().regra_tipo=t;renderTab();}
function updRegra(f,v){gc()[f]=parseFloat(v)||0;renderTab();}
async function saveConfig(){
  const c=gc();await sb.from('prec_clients').update({regra_tipo:c.regra_tipo,regra_t1:c.regra_t1,regra_t2:c.regra_t2,regra_t3:c.regra_t3}).eq('id',c.id);
  toast('Configurações salvas!');
}
function closeModal(e){if(e&&e.target!==e.currentTarget)return;ST.modal=null;render();}
async function handleFoto(input){
  const file=input.files[0];if(!file)return;
  const ext=file.name.split('.').pop();
  const path=`produtos/${Date.now()}.${ext}`;
  const{data,error}=await sb.storage.from('product-images').upload(path,file,{upsert:true});
  if(error){toast('Erro ao enviar foto','error');return;}
  const{data:{publicUrl}}=sb.storage.from('product-images').getPublicUrl(path);
  ST.modal.p.foto_url=publicUrl;render();
}
// Calculadora helpers
function onCalcProd(id){
  ST.calc.prodId=id;ST.calc.kit=null;
  const cli=gc();const p=cli.produtos.find(x=>String(x.id)===id);
  if(p&&p.kits.length===1){ST.calc.kit=p.kits[0].qty;onCalcKit(p.kits[0].qty);}
  renderTab();
}
function onCalcKit(qty){
  qty=parseInt(qty)||null;ST.calc.kit=qty;
  const cli=gc();const p=cli.produtos.find(x=>String(x.id)===String(ST.calc.prodId));
  const k=p?.kits?.find(x=>x.qty===qty);
  if(k){
    const pl=ST.calc.plat;
    if(k.precos?.[pl]) ST.calc.preco=String(k.precos[pl]);
    if(k.custos?.[pl]) ST.calc.custo=String(k.custos[pl]);
    if(k.peso_kg) ST.calc.peso=String(k.peso_kg);
  }
  renderTab();
}

loadAll();
</script>
</body>
</html>
