<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Precificação — Agência</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f7f7f5;
  --surface:#ffffff;
  --surface2:#f0f0ec;
  --border:#e5e5e0;
  --border2:#d0d0c8;
  --text:#1a1a18;
  --text2:#6b6b65;
  --text3:#9b9b94;
  --accent:#2d6a4f;
  --accent-bg:#e8f5ee;
  --accent-text:#1b4332;
  --danger:#c1121f;
  --danger-bg:#fee2e2;
  --warn:#d97706;
  --warn-bg:#fef3c7;
  --orange:#c05621;
  --orange-bg:#fff0e6;
  --success:#166534;
  --success-bg:#dcfce7;
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --r:8px;
  --r-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;height:100vh;overflow:hidden}
/* layout */
.app{display:flex;height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-logo-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.sb-logo-sub{font-size:11px;color:var(--text3);margin-top:1px}
.sb-section{padding:10px 8px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.sb-list{flex:1;overflow-y:auto;padding:4px 8px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-count{margin-left:auto;font-size:10px;background:var(--surface2);color:var(--text3);padding:1px 6px;border-radius:20px}
.sb-item.active .sb-count{background:var(--accent);color:#fff}
.sb-footer{padding:8px;border-top:1px solid var(--border)}
.sb-add-btn{display:flex;align-items:center;gap:6px;width:100%;padding:8px 10px;border-radius:var(--r);border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.sb-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;height:52px;gap:12px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px;flex:1}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:-.02em}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:var(--accent-bg);color:var(--accent-text)}
.badge-gray{background:var(--surface2);color:var(--text3)}
.badge-red{background:var(--danger-bg);color:var(--danger)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}
.badge-yellow{background:var(--warn-bg);color:var(--warn)}
/* tabs */
.tabs{display:flex;gap:1px;background:var(--surface2);padding:3px;border-radius:var(--r);border:1px solid var(--border)}
.tab-btn{padding:5px 12px;font-size:12px;border-radius:6px;cursor:pointer;color:var(--text2);border:none;background:transparent;font-family:var(--font);transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
/* content */
.content{flex:1;overflow-y:auto;padding:20px}
/* search */
.search-wrap{position:relative;margin-bottom:16px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.search-input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface);font-size:13px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:4px}
.search-clear:hover{color:var(--text)}
.scope-row{display:flex;gap:6px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.scope-btn{padding:4px 10px;font-size:11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .15s}
.scope-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.scope-info{margin-left:auto;font-size:11px;color:var(--text3)}
/* product cards */
.prod-card{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:8px;background:var(--surface);transition:box-shadow .15s}
.prod-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.prod-card-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:12px}
.prod-card-name{font-size:13px;font-weight:600;letter-spacing:-.01em}
.prod-card-meta{font-size:11px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.prod-card-body{border-top:1px solid var(--border);padding:14px 16px;background:var(--surface2);display:none}
.prod-card-body.open{display:block}
/* tables */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;padding:6px 10px;color:var(--text3);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--surface);white-space:nowrap}
.data-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--surface2)}
.data-table td.mono{font-family:var(--mono);font-size:11px;color:var(--text2)}
/* chips */
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;margin:1px;white-space:nowrap}
.chip-shopee{background:#fee2d5;color:#9d2a0a}
.chip-shein{background:#d1fae5;color:#065f46}
.chip-ml{background:#fef9c3;color:#713f12}
.chip-tiktok{background:#f1f5f9;color:#334155}
.chip-kit{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
/* lucro badges */
.lv{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap;font-family:var(--mono)}
.lv-g{background:var(--success-bg);color:var(--success)}
.lv-a{background:var(--warn-bg);color:var(--warn)}
.lv-l{background:var(--orange-bg);color:var(--orange)}
.lv-r{background:var(--danger-bg);color:var(--danger)}
.lv-n{color:var(--text3);font-size:11px}
/* highlight */
mark{background:#fef08a;border-radius:2px;padding:0 1px;color:inherit}
/* kpi */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500}
.kpi-val{font-size:24px;font-weight:600;letter-spacing:-.03em;font-family:var(--mono)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
.kpi.danger .kpi-val{color:var(--danger)}
.kpi.success .kpi-val{color:var(--success)}
.kpi.warn .kpi-val{color:var(--warn)}
/* bars */
.bar-wrap{display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:11px}
.bar-label{width:150px;flex-shrink:0;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:12px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-val{width:70px;text-align:right;font-weight:600;font-family:var(--mono);font-size:11px}
/* section */
.sec{margin-bottom:22px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-title{font-size:13px;font-weight:600;letter-spacing:-.01em}
.sec-line{flex:1;height:1px;background:var(--border)}
/* alert */
.alert-list{display:flex;flex-direction:column;gap:6px}
.alert-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--r-lg);border:1px solid}
.alert-item.red{border-color:#fca5a5;background:#fff5f5}
.alert-item.orange{border-color:#fdba74;background:#fff7ed}
.alert-item.yellow{border-color:#fcd34d;background:#fffbeb}
.alert-name{font-size:12px;font-weight:600}
.alert-desc{font-size:11px;color:var(--text2);margin-top:2px}
/* plat compare */
.plat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.plat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 14px}
.plat-stat{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border)}
.plat-stat:last-child{border-bottom:none}
/* taxas */
.taxas-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.taxa-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px}
.taxa-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.taxa-row:last-child{border-bottom:none}
.taxa-input{width:70px;padding:3px 7px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);text-align:right;font-family:var(--mono);outline:none}
.taxa-input:focus{border-color:var(--accent)}
/* sim */
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:700px}
.sim-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px}
/* modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);width:600px;max-width:96vw;max-height:90vh;overflow-y:auto;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:600;letter-spacing:-.02em}
/* forms */
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
.form-input{width:100%;padding:8px 10px;font-size:13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.kit-block{background:var(--surface2);border-radius:var(--r);padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.kit-block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.plat-checks{display:flex;flex-wrap:wrap;gap:6px}
.plat-cb{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:12px;user-select:none;transition:all .15s;background:var(--surface)}
.plat-cb.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.tgl-group{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;width:fit-content}
.tgl-btn{padding:7px 14px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s;border-right:1px solid var(--border)}
.tgl-btn:last-child{border-right:none}
.tgl-btn.on{background:var(--text);color:#fff;font-weight:500}
.divider{height:1px;background:var(--border);margin:16px 0}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;border:1px solid transparent}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{opacity:.85}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-outline:hover{background:var(--surface2)}
.btn-icon{background:transparent;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:6px;display:flex;align-items:center;transition:all .15s}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-icon.danger:hover{color:var(--danger);background:var(--danger-bg)}
/* config */
.config-wrap{max-width:500px}
.config-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:14px}
.config-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.regra-grid{display:grid;grid-template-columns:20px 1fr 90px 30px;gap:8px;align-items:center;margin-bottom:8px;font-size:12px}
.cor-dot{width:12px;height:12px;border-radius:50%}
.preview-box{background:var(--surface2);border-radius:var(--r);padding:12px;border:1px solid var(--border)}
/* loading/empty */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);gap:10px;font-size:13px}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:32px;opacity:.3;margin-bottom:12px}
.empty-text{font-size:13px;font-weight:500;margin-bottom:5px;color:var(--text2)}
.empty-sub{font-size:12px}
/* spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
/* toast */
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:12px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:slideIn .2s ease;display:flex;align-items:center;gap:8px}
.toast.error{background:var(--danger)}
.toast.success{background:var(--success)}
@keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
/* legend */
.legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:50%}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading"><div class="spinner"></div> Carregando...</div>
</div>
<div class="toast-wrap" id="toasts"></div>

<script>
const SUPABASE_URL = 'https://yvgoseljxxdczpziituq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2Z29zZWxqeHhkY3pwemlpdHVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MTQ0MzksImV4cCI6MjA5NTI5MDQzOX0.1gEdI1aaw97oYMQV0pmWJR2JXQgtp514ZuUsKHI9dZE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PLATS=[
  {id:'shopee',label:'Shopee',cls:'chip-shopee'},
  {id:'shein',label:'Shein',cls:'chip-shein'},
  {id:'ml_classico',label:'ML Clássico',cls:'chip-ml'},
  {id:'ml_premium',label:'ML Premium',cls:'chip-ml'},
  {id:'tiktok',label:'TikTok',cls:'chip-tiktok'},
];
const TAXA_D={
  shopee:[{n:'Comissão',v:20},{n:'Nota Fiscal',v:6.76},{n:'Ads',v:3.5},{n:'Afiliados',v:2.8},{n:'Cupom',v:1.5},{n:'Of. Relâmpago',v:0.3},{n:'Campanha',v:3.5},{n:'Leve+Por',v:0.2},{n:'Live/Vídeo',v:0.15},{n:'Mão de Obra',v:1.5}],
  shein:[{n:'Comissão',v:16},{n:'Nota Fiscal',v:7.3},{n:'Campanha',v:20},{n:'Of. Relâmpago',v:0.3},{n:'Cupom',v:1.67},{n:'Leve+Por',v:0.1},{n:'Mão de Obra',v:1.5}],
  ml_classico:[{n:'Comissão',v:14},{n:'Nota Fiscal',v:11.07},{n:'Afiliados',v:1},{n:'Ads Produto',v:5},{n:'Ads Perfil',v:1.3},{n:'Cupom',v:1.3},{n:'Of. Relâmpago',v:0.3},{n:'Mão de Obra',v:1.5}],
  ml_premium:[{n:'Comissão',v:19},{n:'Nota Fiscal',v:11.07},{n:'Afiliados',v:1},{n:'Ads Produto',v:5},{n:'Ads Perfil',v:1.3},{n:'Cupom',v:1.3},{n:'Of. Relâmpago',v:0.3},{n:'Mão de Obra',v:1.5}],
  tiktok:[{n:'Comissão',v:6},{n:'Taxa Frete%',v:6},{n:'Ads',v:5},{n:'Campanha',v:5},{n:'Afiliados',v:7},{n:'Cupom',v:0.9},{n:'Leve+Por',v:0.2},{n:'Nota Fiscal',v:7.3},{n:'Mão de Obra',v:1.5}],
};
const TF_D={
  shopee:[{n:'Taxa fixa',v:4},{n:'Embal.K3',v:0.1},{n:'Embal.K5',v:0.1},{n:'Embal.K10',v:0.13}],
  shein:[{n:'Frete K3/5',v:4},{n:'Frete K10',v:5},{n:'Embal.K3',v:0.1},{n:'Embal.K5',v:0.1},{n:'Embal.K10',v:0.13}],
  ml_classico:[{n:'Embal.K3',v:0.1},{n:'Embal.K5',v:0.1},{n:'Embal.K10',v:0.13}],
  ml_premium:[{n:'Embal.K3',v:0.1},{n:'Embal.K5',v:0.1},{n:'Embal.K10',v:0.13}],
  tiktok:[{n:'Taxa fixa',v:4},{n:'Live/Vídeo',v:0.5},{n:'Embal.K3',v:0.1},{n:'Embal.K5',v:0.1},{n:'Embal.K10',v:0.13}],
};
const COLORS=['#2d6a4f','#6d28d9','#c2410c','#0369a1','#be185d'];

// ── STATE ──────────────────────────────────────
let ST={clients:[],activeId:null,tab:'busca',open:{},search:{q:'',scope:'todos'},modal:null,loading:true};

function mkTaxas(){
  const t={};
  for(const k of Object.keys(TAXA_D)) t[k]={perc:TAXA_D[k].map(r=>({...r})),fixas:TF_D[k].map(r=>({...r}))};
  return t;
}
function gc(){return ST.clients.find(c=>c.id===ST.activeId)||ST.clients[0]||null;}

// ── SUPABASE ───────────────────────────────────
async function loadAll(){
  const{data:clients,error}=await sb.from('prec_clients').select('*').order('created_at');
  if(error){toast('Erro ao carregar dados','error');console.error(error);ST.loading=false;render();return;}
  for(const c of (clients||[])){
    const{data:prods}=await sb.from('prec_products').select('*').eq('client_id',c.id).order('created_at');
    c.produtos=prods||[];
    if(!c.taxas) c.taxas=mkTaxas();
    else if(typeof c.taxas==='string') c.taxas=JSON.parse(c.taxas);
  }
  ST.clients=clients||[];
  if(!ST.activeId&&ST.clients.length) ST.activeId=ST.clients[0].id;
  ST.loading=false;
  render();
}

async function saveClient(c){
  const payload={name:c.name,color:c.color,taxas:c.taxas,regra_tipo:c.regra_tipo||'peca',regra_t1:c.regra_t1||1.20,regra_t2:c.regra_t2||1.50,regra_t3:c.regra_t3||1.80};
  if(c.id&&!String(c.id).startsWith('new')){
    await sb.from('prec_clients').update(payload).eq('id',c.id);
  } else {
    const{data}=await sb.from('prec_clients').insert(payload).select().single();
    if(data) c.id=data.id;
  }
}

async function saveProduct(p,clientId){
  const payload={client_id:clientId,sku:p.sku,nome:p.nome,fabricacao:p.fabricacao||false,plataformas:p.plataformas,kits:p.kits};
  if(p.id&&!String(p.id).startsWith('new')){
    await sb.from('prec_products').update(payload).eq('id',p.id);
  } else {
    const{data}=await sb.from('prec_products').insert(payload).select().single();
    if(data) p.id=data.id;
  }
}

async function deleteProduct(pid){
  await sb.from('prec_products').delete().eq('id',pid);
}

// ── CALC ────────────────────────────────────────
function calcR(preco,custo,platId,taxas){
  if(!preco||preco<=0||!custo||custo<=0) return null;
  const t=taxas[platId];if(!t) return null;
  const tp=t.perc.reduce((s,r)=>s+(r.v||0),0)/100;
  const tf=t.fixas.reduce((s,r)=>s+(r.v||0),0);
  const tax=preco*tp+tf;
  const lucro=preco-custo-tax;
  return{lucro,margem:preco>0?lucro/preco*100:0,tax,preco,custo};
}
function cor(r,qty,c){
  if(!r) return null;
  const val=c.regra_tipo==='peca'?(qty>0?r.lucro/qty:r.lucro):r.margem;
  if(val<=(c.regra_t1||1.2)) return 'r';
  if(val<=(c.regra_t2||1.5)) return 'l';
  if(val<=(c.regra_t3||1.8)) return 'a';
  return 'g';
}
function allRes(c){
  const out=[];
  for(const p of c.produtos)
    for(const pl of (p.plataformas||[]))
      for(const k of (p.kits||[])){
        const r=calcR(k.precos?.[pl],k.custos?.[pl],pl,c.taxas);
        if(r) out.push({p,pl,k,r,cor:cor(r,k.qty,c)});
      }
  return out;
}
function bestR(p,c){
  let best=null,bc=null;const pri={g:4,a:3,l:2,r:1};
  for(const pl of (p.plataformas||[]))for(const k of (p.kits||[])){
    const r=calcR(k.precos?.[pl],k.custos?.[pl],pl,c.taxas);
    if(r){const co=cor(r,k.qty,c);if(!best||(pri[co]||0)>(pri[bc]||0)){best=r;bc=co;}}
  }
  return{r:best,cor:bc};
}
function hlMark(str,q){
  if(!q||!str) return String(str||'');
  return String(str).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}

function renderBusca(c){
  const q=ST.search.q.trim();
  const sc=ST.search.scope;
  const clientesBusca=sc==='global'?ST.clients:[c];
  let res=[];
  for(const cli of clientesBusca){
    for(const p of (cli.produtos||[])){
      const lq=q.toLowerCase();
      const matchSku=String(p.sku||'').toLowerCase().includes(lq);
      const matchNome=(p.nome||'').toLowerCase().includes(lq);
      const ok=!q||(sc==='sku'&&matchSku)||(sc==='produto'&&matchNome)||(sc!=='sku'&&sc!=='produto'&&(matchSku||matchNome));
      if(ok){
        const{r,cor:co}=bestR(p,cli);
        const allR=allRes(cli).filter(x=>x.p.id===p.id);
        const avgM=allR.length?allR.reduce((s,x)=>s+x.r.margem,0)/allR.length:0;
        res.push({p,cli,r,cor:co,avgM,allR});

    :res.map(({p,cli,r,cor:co,avgM})=>{
      const platH=(p.plataformas||[]).map(pl=>{const po=PLATS.find(x=>x.id===pl);return po?`<span class="chip ${po.cls}">${po.label}</span>`:''}).join('');
      const kitH=(p.kits||[]).map(k=>`<span class="chip chip-kit">K${k.qty}</span>`).join('');

          <div class="prod-card-head" onclick="togOpen('${p.id}')">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <span class="prod-card-name">${nH}</span>
                ${r?`<span class="lv lv-${co}">R$ ${r.lucro.toFixed(2)}</span>`:''}
                ${sc==='global'?`<span class="badge badge-gray" style="font-size:10px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${cli.color};margin-right:4px;vertical-align:middle"></span>${cli.name}</span>`:''}
              </div>
              <div class="prod-card-meta">
                <span>SKU <b>${sH}</b></span>
                <span>Margem média ${avgM.toFixed(1)}%</span>
                <span>${p.fabricacao?'🔨 Fabricação':'🛒 Revenda'}</span>

  const total=all.length,verm=all.filter(x=>x.cor==='r').length,grn=all.filter(x=>x.cor==='g').length;
  const avgM=all.reduce((s,x)=>s+x.r.margem,0)/all.length;

        ${[['g','Verde',grn,'#dcfce7','#166534'],['a','Amarelo',all.filter(x=>x.cor==='a').length,'#fef9c3','#713f12'],['l','Laranja',all.filter(x=>x.cor==='l').length,'#ffedd5','#9a3412'],['r','Vermelho',verm,'#fee2e2','#b91c1c']].map(([,lb,qt,bg,fg])=>`

    const t=c.taxas[pl.id];
    return`<div class="taxa-card">
      <div style="margin-bottom:10px"><span class="chip ${pl.cls}">${pl.label}</span></div>
      <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Percentuais (%)</div>
      ${t.perc.map((r,i)=>`<div class="taxa-row"><span style="color:var(--text2)">${r.n}</span><div style="display:flex;align-items:center;gap:4px"><input class="taxa-input" type="number" value="${r.v}" step="0.1" onchange="updTaxa('${pl.id}','perc',${i},this.value)"/><span style="font-size:10px;color:var(--text3)">%</span></div></div>`).join('')}
      <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px">Fixas (R$)</div>
      ${t.fixas.map((r,i)=>`<div class="taxa-row"><span style="color:var(--text2)">${r.n}</span><div style="display:flex;align-items:center;gap:4px"><input class="taxa-input" type="number" value="${r.v}" step="0.01" onchange="updTaxaFixa('${pl.id}',${i},this.value)"/><span style="font-size:10px;color:var(--text3)">R$</span></div></div>`).join('')}
      <button class="btn btn-outline" style="width:100%;margin-top:10px;font-size:11px" onclick="saveTaxas()">Salvar taxas</button>
    </div>`;}).join('')}</div>`;
}

// ── CONFIG ──────────────────────────────────────
function renderConfig(c){
  const t=c.regra_tipo||'peca';
  const v1=c.regra_t1||1.20,v2=c.regra_t2||1.50,v3=c.regra_t3||1.80;
  const u=t==='peca'?'R$/pç':'%';
  return`<div class="config-wrap">
    <div class="config-card">
      <div class="config-title">Tipo de regra de margem</div>
      <div class="tgl-group">
        <button class="tgl-btn ${t==='peca'?'on':''}" onclick="setRegraTipo('peca')">R$ por peça</button>
        <button class="tgl-btn ${t==='perc'?'on':''}" onclick="setRegraTipo('perc')">% de margem</button>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:8px">${t==='peca'?'Lucro dividido pela quantidade do kit, comparado ao valor por peça.':'Margem percentual comparada às faixas abaixo.'}</div>
    </div>
    <div class="config-card">
      <div class="config-title">Faixas de alerta</div>
      ${[['#fee2e2','#b91c1c','Vermelho — de 0 até','regra_t1',v1],['#ffedd5','#9a3412','Laranja — até','regra_t2',v2],['#fef9c3','#713f12','Amarelo — até','regra_t3',v3]].map(([bg,fg,lb,field,val])=>`
        <div class="regra-grid">
          <div class="cor-dot" style="background:${bg};border:2px solid ${fg}"></div>
          <span style="font-size:12px;color:var(--text2)">${lb}</span>
          <input class="taxa-input" style="width:80px" type="number" value="${val}" step="${t==='peca'?'0.01':'1'}" onchange="updRegra('${field}',this.value)"/>
          <span style="font-size:11px;color:var(--text3)">${u}</span>
        </div>`).join('')}
      <div style="font-size:11px;color:var(--text3);margin-top:4px">Verde — acima de ${v3}${u}</div>
    </div>
    <div class="preview-box">
      <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Prévia das faixas</div>
      ${t==='peca'?`<div style="display:flex;gap:10px;flex-wrap:wrap">${[3,5,10].map(qty=>`
        <div><div style="font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:500">Kit ${qty}</div>
          <div style="display:flex;flex-direction:column;gap:3px">
            <span class="lv lv-r">0 – R$${(v1*qty).toFixed(2)}</span>
            <span class="lv lv-l">R$${(v1*qty).toFixed(2)} – R$${(v2*qty).toFixed(2)}</span>
            <span class="lv lv-a">R$${(v2*qty).toFixed(2)} – R$${(v3*qty).toFixed(2)}</span>
            <span class="lv lv-g">> R$${(v3*qty).toFixed(2)}</span>
          </div>
        </div>`).join('')}</div>`:`
        <div style="display:flex;flex-direction:column;gap:4px">
          <span class="lv lv-r">0 – ${v1}%</span>
          <span class="lv lv-l">${v1}% – ${v2}%</span>
          <span class="lv lv-a">${v2}% – ${v3}%</span>
          <span class="lv lv-g">> ${v3}%</span>
        </div>`}
    </div>
    <button class="btn btn-primary" style="margin-top:14px" onclick="saveConfig()">Salvar configurações</button>
  </div>`;
}

// ── SIMULADOR ───────────────────────────────────
function renderSim(c){
  const prods=c.produtos||[];
  return`<div class="sim-grid">
    <div class="sim-card">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">Qual preço cobrar para ter X de margem?</div>
      <div class="form-group"><div class="form-label">Produto</div>
        <select class="form-input" id="s1p" onchange="s1Kit()"><option value="">Selecione...</option>${prods.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')}</select></div>
      <div class="form-row">
        <div class="form-group"><div class="form-label">Plataforma</div><select class="form-input" id="s1pl" onchange="calcS1()">${PLATS.map(p=>`<option value="${p.id}">${p.label}</option>`).join('')}</select></div>
        <div class="form-group"><div class="form-label">Kit</div><select class="form-input" id="s1k" onchange="calcS1()"><option value="">—</option></select></div>
      </div>
      <div class="form-group"><div class="form-label">${(c.regra_tipo||'peca')==='peca'?'Lucro por peça (R$)':'Margem desejada (%)'}</div>
        <input type="number" class="form-input" id="s1a" placeholder="${(c.regra_tipo||'peca')==='peca'?'ex: 1.80':'ex: 15'}" oninput="calcS1()"/></div>
      <div id="s1r"></div>
    </div>
    <div class="sim-card">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">Com esse preço, qual é meu lucro?</div>
      <div class="form-group"><div class="form-label">Produto</div>
        <select class="form-input" id="s2p" onchange="s2Kit()"><option value="">Selecione...</option>${prods.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')}</select></div>
      <div class="form-row">
        <div class="form-group"><div class="form-label">Plataforma</div><select class="form-input" id="s2pl" onchange="calcS2()">${PLATS.map(p=>`<option value="${p.id}">${p.label}</option>`).join('')}</select></div>
        <div class="form-group"><div class="form-label">Kit</div><select class="form-input" id="s2k" onchange="calcS2()"><option value="">—</option></select></div>
      </div>
      <div class="form-group"><div class="form-label">Preço de venda (R$)</div>
        <input type="number" class="form-input" id="s2v" placeholder="ex: 39.90" oninput="calcS2()"/></div>
      <div id="s2r"></div>
    </div>
  </div>`;
}

// ── MODAL ───────────────────────────────────────
function renderModal(){
  const m=ST.modal;
  if(m.type==='nc') return`
    <div class="modal-backdrop" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header"><div class="modal-title">Novo cliente</div><button class="btn-icon" onclick="closeModal()">✕</button></div>
        <div class="form-group"><div class="form-label">Nome do cliente</div><input class="form-input" id="nc-n" placeholder="ex: Maria Moda"/></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
          <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="saveNewClient()">Criar cliente</button>
        </div>
      </div>
    </div>`;
  if(m.type==='prod'){
    const p=m.p;const kits=p.kits||[];
    return`
      <div class="modal-backdrop" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-header"><div class="modal-title">${m.edit?'Editar produto':'Novo produto'}</div><button class="btn-icon" onclick="closeModal()">✕</button></div>
          <div class="form-row">
            <div class="form-group"><div class="form-label">SKU</div><input class="form-input" id="p-sku" value="${p.sku||''}" placeholder="001"/></div>
            <div class="form-group"><div class="form-label">Nome do produto</div><input class="form-input" id="p-nome" value="${p.nome||''}" placeholder="ex: Calçola Comfort"/></div>
          </div>
          <div class="form-group"><div class="form-label">Tipo</div>
            <div class="tgl-group">
              <button class="tgl-btn ${!p.fabricacao?'on':''}" onclick="setFab(false)">🛒 Revenda</button>
              <button class="tgl-btn ${p.fabricacao?'on':''}" onclick="setFab(true)">🔨 Fabricação própria</button>
            </div>
          </div>
          <div class="form-group"><div class="form-label">Plataformas</div>
            <div class="plat-checks" id="plat-checks">
              ${PLATS.map(pl=>`<div class="plat-cb ${(p.plataformas||[]).includes(pl.id)?'on':''}" onclick="togPlat('${pl.id}')">✓ ${pl.label}</div>`).join('')}
            </div>
          </div>
          <div class="divider"></div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-size:13px;font-weight:600">Kits e preços</div>
            <button class="btn btn-outline" style="font-size:11px;padding:5px 10px" onclick="addKit()">+ Kit</button>
          </div>
          <div id="kits-c">
            ${kits.length===0?`<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">Nenhum kit adicionado</div>`:kits.map((k,i)=>renderKitBlock(k,i,p.plataformas||[])).join('')}
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
            <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" id="save-prod-btn" onclick="saveProduto()">
              <span id="save-prod-txt">${m.edit?'Salvar alterações':'Cadastrar produto'}</span>
            </button>
          </div>
        </div>
      </div>`;
  }
  if(m.type==='del') return`
    <div class="modal-backdrop" onclick="closeModal(event)">
      <div class="modal" style="max-width:400px" onclick="event.stopPropagation()">
        <div class="modal-header"><div class="modal-title">Excluir produto</div><button class="btn-icon" onclick="closeModal()">✕</button></div>
        <p style="font-size:13px;color:var(--text2);margin-bottom:18px">Tem certeza que deseja excluir <b>${m.nome}</b>? Esta ação não pode ser desfeita.</p>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
          <button class="btn" style="background:var(--danger);color:#fff;border-color:var(--danger)" onclick="execDelProd()">Excluir</button>
        </div>
      </div>
    </div>`;
  return'';
}

function renderKitBlock(k,i,plats){
  return`<div class="kit-block">
    <div class="kit-block-head">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600">Kit
        <input type="number" class="form-input" style="width:65px" value="${k.qty||''}" min="1" placeholder="qtd" onchange="updKitQty(${i},this.value)"/> peças
      </div>
      <button class="btn-icon danger" onclick="rmKit(${i})">🗑️</button>
    </div>
    ${plats.length===0?`<div style="font-size:11px;color:var(--text3);text-align:center">Selecione plataformas primeiro</div>`:`
      <div style="display:grid;grid-template-columns:70px repeat(${plats.length},1fr);gap:5px;align-items:center;font-size:11px;margin-top:4px">
        <div></div>${plats.map(pl=>{const po=PLATS.find(x=>x.id===pl);return`<div style="text-align:center;color:var(--text3);font-weight:600">${po?.label||pl}</div>`}).join('')}
        <div style="color:var(--text3);font-weight:500">Preço (R$)</div>${plats.map(pl=>`<input type="number" class="form-input" style="font-size:11px;padding:5px" placeholder="0.00" value="${k.precos?.[pl]||''}" onchange="updKitVal(${i},'precos','${pl}',this.value)"/>`).join('')}
        <div style="color:var(--text3);font-weight:500">Custo (R$)</div>${plats.map(pl=>`<input type="number" class="form-input" style="font-size:11px;padding:5px" placeholder="0.00" value="${k.custos?.[pl]||''}" onchange="updKitVal(${i},'custos','${pl}',this.value)"/>`).join('')}
      </div>`}
  </div>`;
}

// ── ACTIONS ─────────────────────────────────────
function selC(id){ST.activeId=id;ST.tab='busca';ST.open={};ST.search={q:'',scope:'todos'};render();}
function setTab(t){ST.tab=t;render();}
function togOpen(id){ST.open[id]=!ST.open[id];renderTab();}
function onSearch(v){ST.search.q=v;renderTab();}
function setScope(s){ST.search.scope=s;renderTab();}
function clearSearch(){ST.search.q='';render();setTimeout(()=>{const el=document.getElementById('si');if(el)el.focus();},30);}

function openNewClient(){ST.modal={type:'nc'};render();}
async function saveNewClient(){
  const name=document.getElementById('nc-n')?.value?.trim();if(!name)return;
  const color=COLORS[ST.clients.length%COLORS.length];
  const nc={name,color,taxas:mkTaxas(),produtos:[],regra_tipo:'peca',regra_t1:1.20,regra_t2:1.50,regra_t3:1.80};
  const{data,error}=await sb.from('prec_clients').insert({name,color,taxas:nc.taxas,regra_tipo:nc.regra_tipo,regra_t1:nc.regra_t1,regra_t2:nc.regra_t2,regra_t3:nc.regra_t3}).select().single();
  if(error){toast('Erro ao criar cliente','error');return;}
  nc.id=data.id;ST.clients.push(nc);ST.activeId=nc.id;ST.modal=null;toast('Cliente criado!');render();
}

function openNewProd(){ST.modal={type:'prod',edit:false,clientId:ST.activeId,p:{sku:'',nome:'',fabricacao:false,plataformas:[],kits:[]}};render();}
function openEditProd(pid,cid){
  const cli=ST.clients.find(c=>String(c.id)===String(cid))||gc();
  const p=cli?.produtos?.find(x=>String(x.id)===String(pid));if(!p)return;
  ST.modal={type:'prod',edit:true,clientId:cli.id,p:JSON.parse(JSON.stringify(p))};render();
}
function confirmDelProd(pid){
  const p=gc()?.produtos?.find(x=>String(x.id)===String(pid));
  ST.modal={type:'del',pid,nome:p?.nome||'produto'};render();
}
async function execDelProd(){
  const pid=ST.modal.pid;
  await deleteProduct(pid);
  const c=gc();if(c)c.produtos=c.produtos.filter(x=>String(x.id)!==String(pid));
  ST.modal=null;toast('Produto excluído');render();
}

function setFab(v){ST.modal.p.fabricacao=v;render();}
function togPlat(pl){
  const p=ST.modal.p;const idx=(p.plataformas||[]).indexOf(pl);
  if(idx>=0)p.plataformas.splice(idx,1);else p.plataformas.push(pl);render();
}
function addKit(){ST.modal.p.kits.push({qty:null,precos:{},custos:{}});render();}
function rmKit(i){ST.modal.p.kits.splice(i,1);render();}
function updKitQty(i,v){ST.modal.p.kits[i].qty=parseInt(v)||null;}
function updKitVal(i,f,pl,v){const k=ST.modal.p.kits[i];if(!k[f])k[f]={};k[f][pl]=parseFloat(v)||null;}

async function saveProduto(){
  const m=ST.modal;const p=m.p;
  p.sku=document.getElementById('p-sku')?.value?.trim();
  p.nome=document.getElementById('p-nome')?.value?.trim();
  if(!p.nome){toast('Informe o nome do produto','error');return;}
  const btn=document.getElementById('save-prod-btn');
  const txt=document.getElementById('save-prod-txt');
  if(btn)btn.disabled=true;if(txt)txt.textContent='Salvando...';
  const cli=ST.clients.find(c=>String(c.id)===String(m.clientId));
  await saveProduct(p,cli.id);
  if(m.edit){const idx=cli.produtos.findIndex(x=>String(x.id)===String(p.id));if(idx>=0)cli.produtos[idx]=p;else cli.produtos.push(p);}
  else cli.produtos.push(p);
  ST.modal=null;toast(m.edit?'Produto atualizado!':'Produto cadastrado!');render();
}

function updTaxa(pl,tipo,i,v){const c=gc();c.taxas[pl][tipo][i].v=parseFloat(v)||0;}
function updTaxaFixa(pl,i,v){const c=gc();c.taxas[pl].fixas[i].v=parseFloat(v)||0;}
async function saveTaxas(){
  const c=gc();await sb.from('prec_clients').update({taxas:c.taxas}).eq('id',c.id);toast('Taxas salvas!');}

function setRegraTipo(t){const c=gc();c.regra_tipo=t;renderTab();}
function updRegra(field,v){const c=gc();c[field]=parseFloat(v)||0;renderTab();}
async function saveConfig(){
  const c=gc();
  await sb.from('prec_clients').update({regra_tipo:c.regra_tipo,regra_t1:c.regra_t1,regra_t2:c.regra_t2,regra_t3:c.regra_t3}).eq('id',c.id);
  toast('Configurações salvas!');
}

function closeModal(e){if(e&&e.target!==e.currentTarget)return;ST.modal=null;render();}

// Simulador
function s1Kit(){const c=gc();const id=document.getElementById('s1p')?.value;const p=c.produtos?.find(x=>String(x.id)===id);const el=document.getElementById('s1k');if(el)el.innerHTML='<option value="">—</option>'+(p?p.kits.map(k=>`<option value="${k.qty}">Kit ${k.qty}</option>`).join(''):'');calcS1();}
function calcS1(){
  const c=gc();const id=document.getElementById('s1p')?.value;const pl=document.getElementById('s1pl')?.value;const qty=+document.getElementById('s1k')?.value;const alvo=parseFloat(document.getElementById('s1a')?.value);
  const box=document.getElementById('s1r');if(!box)return;
  const p=c.produtos?.find(x=>String(x.id)===id);const k=p?.kits?.find(x=>x.qty===qty);
  if(!p||!k||!pl||isNaN(alvo)){box.innerHTML='';return;}
  const custo=k.custos?.[pl]||0;const t=c.taxas[pl];
  const tp=t.perc.reduce((s,r)=>s+(r.v||0),0)/100;const tf=t.fixas.reduce((s,r)=>s+(r.v||0),0);
  const preco=c.regra_tipo==='peca'?(custo+tf+alvo*qty)/(1-tp):(custo+tf)/(1-tp-alvo/100);
  if(!isFinite(preco)||preco<=0){box.innerHTML=`<div style="color:var(--danger);font-size:12px">Margem inviável.</div>`;return;}
  const r=calcR(preco,custo,pl,c.taxas);const co=r?cor(r,qty,c):'n';
  box.innerHTML=`<div style="margin-top:10px;background:var(--surface2);border-radius:var(--r);padding:12px;border:1px solid var(--border)"><div style="font-size:11px;color:var(--text3)">Preço sugerido</div><div style="margin:4px 0"><span class="lv lv-${co}" style="font-size:15px">R$ ${preco.toFixed(2)}</span></div><div style="font-size:11px;color:var(--text3)">Lucro R$${r?.lucro.toFixed(2)||'?'} · Margem ${r?.margem.toFixed(1)||'?'}%</div></div>`;
}
function s2Kit(){const c=gc();const id=document.getElementById('s2p')?.value;const p=c.produtos?.find(x=>String(x.id)===id);const el=document.getElementById('s2k');if(el)el.innerHTML='<option value="">—</option>'+(p?p.kits.map(k=>`<option value="${k.qty}">Kit ${k.qty}</option>`).join(''):'');calcS2();}
function calcS2(){
  const c=gc();const id=document.getElementById('s2p')?.value;const pl=document.getElementById('s2pl')?.value;const qty=+document.getElementById('s2k')?.value;const preco=parseFloat(document.getElementById('s2v')?.value);
  const box=document.getElementById('s2r');if(!box)return;
  const p=c.produtos?.find(x=>String(x.id)===id);const k=p?.kits?.find(x=>x.qty===qty);
  if(!p||!k||!pl||isNaN(preco)){box.innerHTML='';return;}
  const custo=k.custos?.[pl]||0;const r=calcR(preco,custo,pl,c.taxas);if(!r){box.innerHTML='';return;}
  const co=cor(r,qty,c);const ppp=r.lucro/qty;
  const bgs={g:['#dcfce7','#166534'],a:['#fef9c3','#713f12'],l:['#ffedd5','#9a3412'],r:['#fee2e2','#b91c1c']};
  const[bg,fg]=bgs[co]||['var(--surface2)','var(--text)'];
  box.innerHTML=`<div style="margin-top:10px;background:${bg};border-radius:var(--r);padding:12px"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"><div><div style="font-size:10px;color:${fg};opacity:.8">Lucro total</div><span class="lv lv-${co}">R$${r.lucro.toFixed(2)}</span></div><div><div style="font-size:10px;color:${fg};opacity:.8">Por peça</div><span class="lv lv-${co}">R$${ppp.toFixed(2)}</span></div><div><div style="font-size:10px;color:${fg};opacity:.8">Margem</div><span class="lv lv-${co}">${r.margem.toFixed(1)}%</span></div></div><div style="font-size:10px;color:${fg};opacity:.7;margin-top:8px">Taxas R$${r.tax.toFixed(2)} · Custo R$${custo.toFixed(2)}</div></div>`;
}

// ── INIT ────────────────────────────────────────
loadAll();
</script>
</body>
</html>
