.alert-list{display:flex;flex-direction:column;gap:6px}

</style>

const ML_FAIXAS=[18.99,48.99,78.99,99.99,119.99,149.99,199.99,Infinity];
function calcFreteML(kg,p){if(!kg||kg<=0||!p||p<=0)return 0;const fi=ML_FAIXAS.findIndex(f=>p<=f);const l=ML_FRETE.find(([pm])=>kg<=pm)||ML_FRETE[ML_FRETE.length-1];return l[1][fi>=0?fi:7]||0;}
function shopeeComissao(p){return p<=79.99?0.20:0.14;}
function shopeeTaxaFixa(p){if(p<=79.99)return 4;if(p<=99.99)return 16;if(p<=199.99)return 20;return 26;}
function mkTaxas(){const t={};for(const k of Object.keys(TAXA_D))t[k]={perc:TAXA_D[k].map(r=>({...r})),fixas:TF_D[k].map(r=>({...r}))};return t;}

function calcR(preco,custo,platId,taxas,pesoKg){
  if(!preco||preco<=0||!custo||custo<=0)return null;
  const t=taxas[platId];if(!t)return null;
  let totalPerc=0;const percDetail=[];
  for(const r of t.perc){let v=r.v;if(platId==='shopee'&&r.n==='Comissão')v=shopeeComissao(preco)*100;totalPerc+=v/100;percDetail.push({n:r.n,v,val:preco*v/100});}
  let totalFixa=0;const fixaDetail=[];
  for(const r of t.fixas){let v=r.v;if(platId==='shopee'&&r.n==='Taxa Fixa')v=shopeeTaxaFixa(preco);totalFixa+=v;fixaDetail.push({n:r.n,v,val:v});}
  let freteML=0;
  if((platId==='ml_classico'||platId==='ml_premium')&&pesoKg>0){freteML=calcFreteML(pesoKg,preco);totalFixa+=freteML;fixaDetail.push({n:'Frete ML (auto)',v:freteML,val:freteML});}
  const tax=preco*totalPerc+totalFixa;const lucro=preco-custo-tax;
  return{lucro,margem:preco>0?lucro/preco*100:0,tax,preco,custo,percDetail,fixaDetail,freteML};
}
function cor(r,qty,c){
  if(!r)return null;
  const val=(c.regra_tipo||'peca')==='peca'?(qty>0?r.lucro/qty:r.lucro):r.margem;
  if(val<=(c.regra_t1||1.2))return 'r';if(val<=(c.regra_t2||1.5))return 'l';if(val<=(c.regra_t3||1.8))return 'a';return 'g';
}
function allRes(c){const out=[];for(const p of c.produtos)for(const pl of(p.plataformas||[]))for(const k of(p.kits||[])){const r=calcR(k.precos?.[pl],k.custos?.[pl],pl,c.taxas,k.peso_kg||0);if(r)out.push({p,pl,k,r,cor:cor(r,k.qty,c)});}return out;}
function bestR(p,c){let best=null,bc=null;const pri={g:4,a:3,l:2,r:1};for(const pl of(p.plataformas||[]))for(const k of(p.kits||[])){const r=calcR(k.precos?.[pl],k.custos?.[pl],pl,c.taxas,k.peso_kg||0);if(r){const co=cor(r,k.qty,c);if(!best||(pri[co]||0)>(pri[bc]||0)){best=r;bc=co;}}}return{r:best,cor:bc};}
function hlMark(str,q){if(!q||!str)return String(str||'');return String(str).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');}

function renderPlataformas(c){

function updateCalc(){
  const c=gc();if(!c)return;
  const platSel=ST.calc.plat||'shopee';
  const preco=parseFloat(document.getElementById('calc-preco')?.value)||0;
  const custo=parseFloat(document.getElementById('calc-custo')?.value)||0;
  const peso=parseFloat(document.getElementById('calc-peso')?.value)||parseFloat(ST.calc.peso)||0;
  const margem=parseFloat(document.getElementById('calc-margem')?.value)||0;
  const resEl=document.getElementById('calc-res');
  const sugEl=document.getElementById('calc-sug');
  if(!resEl)return;
  // Sugestão
  if(sugEl&&custo>0){
    const t=c.taxas[platSel];
    function alvo(ma){
      let p=custo*2;
      for(let i=0;i<80;i++){
        const tp=platSel==='shopee'?shopeeComissao(p):t.perc.reduce((s,r)=>s+(r.v||0),0)/100;
        const tfE=platSel==='shopee'?t.fixas.filter(r=>r.n!=='Taxa Fixa').reduce((s,r)=>s+(r.v||0),0):0;
        const tf=platSel==='shopee'?shopeeTaxaFixa(p)+tfE:t.fixas.reduce((s,r)=>s+(r.v||0),0);
        const fr=(platSel==='ml_classico'||platSel==='ml_premium')&&peso>0?calcFreteML(peso,p):0;
        const d=1-tp-ma;if(d<=0)break;
        const p2=(custo+tf+fr)/d;if(!isFinite(p2)||p2<=0)break;
        if(Math.abs(p2-p)<0.01)break;p=p2;
      }
      return Math.max(0,p);
    }
    const pMin=alvo(0);const pIdeal=margem>0?alvo(margem/100):null;
    sugEl.innerHTML=`<div class="sugestao-box"><div style="font-size:12px;font-weight:700;color:var(--accent-text);margin-bottom:8px">💡 Sugestão de Preço</div>
      <div class="sugestao-row"><span style="color:var(--accent-text)">Preço Mínimo (sem prejuízo)</span><span style="font-family:var(--mono);font-weight:700;color:var(--accent-text)">R$ ${pMin.toFixed(2)}</span></div>
      ${pIdeal?`<div class="sugestao-row"><span style="color:var(--accent-text)">Preço com ${margem}% de margem</span><span style="font-family:var(--mono);font-weight:700;color:var(--accent-text)">R$ ${pIdeal.toFixed(2)}</span></div>`:''}
    </div>`;
  } else if(sugEl) sugEl.innerHTML='';
  if(!preco||!custo){resEl.innerHTML=`<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">Preencha preço e custo para ver o resultado</div>`;return;}
  const r=calcR(preco,custo,platSel,c.taxas,peso);
  if(!r){resEl.innerHTML='<div style="color:var(--text3);padding:20px;text-align:center">Dados insuficientes</div>';return;}
  const cBg=r.lucro>=0?'var(--accent-bg)':'var(--danger-bg)';const cFg=r.lucro>=0?'var(--accent-text)':'var(--danger)';
  resEl.innerHTML=
    r.percDetail.map(d=>`<div class="taxa-detail-row"><span style="color:var(--text2)">${d.n}${platSel==='shopee'&&d.n==='Comissão'?`<span class="shopee-badge">${preco<=79.99?'20% ≤R$79':'14% ≥R$80'}</span>`:''}</span><div style="display:flex;gap:8px;align-items:center"><span style="color:var(--text3);font-size:10px">${d.v.toFixed(2)}%</span><span class="calc-val">R$ ${d.val.toFixed(2)}</span></div></div>`).join('')+
    r.fixaDetail.map(d=>`<div class="taxa-detail-row"><span style="color:var(--text2)">${d.n}${platSel==='shopee'&&d.n==='Taxa Fixa'?`<span class="shopee-badge">R$${shopeeTaxaFixa(preco)} auto</span>`:''}</span><span class="calc-val">R$ ${d.val.toFixed(2)}</span></div>`).join('')+
    `<div style="height:1px;background:var(--border);margin:8px 0"></div>
    <div class="calc-row total"><span>Total de Taxas</span><span class="calc-val" style="color:var(--danger)">R$ ${r.tax.toFixed(2)}</span></div>
    <div style="height:1px;background:var(--border);margin:8px 0"></div>
    <div class="calc-row"><span>Preço de Venda</span><span class="calc-val">R$ ${r.preco.toFixed(2)}</span></div>
    <div class="calc-row"><span>Custo de Compra</span><span class="calc-val" style="color:var(--danger)">R$ ${r.custo.toFixed(2)}</span></div>
    <div class="calc-row total"><span>Total Geral (Taxas + Custo)</span><span class="calc-val" style="color:var(--danger)">R$ ${(r.tax+r.custo).toFixed(2)}</span></div>
    <div style="height:1px;background:var(--border);margin:8px 0"></div>
    <div style="background:${cBg};border-radius:var(--r);padding:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:14px;font-weight:700;color:${cFg}">LUCRO EM R$</span><span style="font-size:18px;font-weight:700;font-family:var(--mono);color:${cFg}">R$ ${r.lucro.toFixed(2)}</span></div>
      <div style="display:flex;justify-content:space-between"><span style="font-size:14px;font-weight:700;color:${cFg}">LUCRO EM %</span><span style="font-size:18px;font-weight:700;font-family:var(--mono);color:${cFg}">${r.margem.toFixed(2)}%</span></div>
    </div>`;
}

  if(m.type==='nc')return`<div class="modal-backdrop" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><div class="modal-title">Novo cliente</div><button class="btn-icon" onclick="closeModal()">✕</button></div><div class="form-group"><div class="form-label">Nome</div><input class="form-input" id="nc-n" placeholder="ex: Maria Moda"/></div><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveNewClient()">Criar</button></div></div></div>`;
  if(m.type==='prod'){
    const p=m.p;const kits=p.kits||[];
    return`<div class="modal-backdrop" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header"><div class="modal-title">${m.edit?'Editar produto':'Novo produto'}</div><button class="btn-icon" onclick="closeModal()">✕</button></div>
      <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:14px">
        <div><div class="form-label" style="margin-bottom:6px">Foto</div>
          <div class="foto-upload" onclick="document.getElementById('foto-input').click()">${p.foto_url?`<img src="${p.foto_url}" style="width:100%;height:100%;object-fit:cover"/>`:`<div class="foto-txt">📷<br/>Adicionar foto</div>`}</div>
          <input type="file" id="foto-input" accept="image/*" style="display:none" onchange="handleFoto(this)"/>
          ${p.foto_url?`<button onclick="ST.modal.p.foto_url=null;render()" style="width:90px;margin-top:4px;font-size:10px;padding:3px;border:1px solid var(--border);border-radius:5px;background:transparent;cursor:pointer;color:var(--text3)">Remover</button>`:''}
        </div>
        <div style="flex:1">
          <div class="form-row"><div class="form-group"><div class="form-label">SKU</div><input class="form-input" id="p-sku" value="${p.sku||''}" placeholder="001"/></div><div class="form-group"><div class="form-label">Nome</div><input class="form-input" id="p-nome" value="${p.nome||''}" placeholder="ex: Calçola Comfort"/></div></div>
          <div class="form-group"><div class="form-label">Tipo</div><div class="tgl-group"><button class="tgl-btn ${!p.fabricacao?'on':''}" onclick="ST.modal.p.fabricacao=false;render()">🛒 Revenda</button><button class="tgl-btn ${p.fabricacao?'on':''}" onclick="ST.modal.p.fabricacao=true;render()">🔨 Fabricação</button></div></div>
        </div>
      </div>
      <div class="form-group"><div class="form-label">Plataformas</div><div class="plat-checks">${PLATS.map(pl=>`<div class="plat-cb ${(p.plataformas||[]).includes(pl.id)?'on':''}" onclick="togPlat('${pl.id}')">✓ ${pl.label}</div>`).join('')}</div></div>
      <div class="form-group"><div class="form-label">Links dos anúncios</div>
        <div style="display:flex;flex-direction:column;gap:6px">${PLATS.map(pl=>`<div style="display:flex;align-items:center;gap:8px"><span class="chip ${pl.cls}" style="width:90px;justify-content:center">${pl.label}</span><input class="form-input" id="link-${pl.id}" style="flex:1" placeholder="URL na ${pl.label}" value="${(p.links&&p.links[pl.id])||''}"/></div>`).join('')}</div>
      </div>
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:13px;font-weight:600">Kits e preços</div><button class="btn btn-outline" style="font-size:11px;padding:5px 10px" onclick="addKit()">+ Kit</button></div>
      <div id="kits-c">${kits.length===0?`<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">Nenhum kit adicionado</div>`:kits.map((k,i)=>renderKitBlock(k,i,p.plataformas||[])).join('')}</div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="save-btn" onclick="saveProduto()">${m.edit?'Salvar':'Cadastrar'}</button></div>
    </div></div>`;
  }
  if(m.type==='del')return`<div class="modal-backdrop" onclick="closeModal(event)"><div class="modal" style="max-width:400px" onclick="event.stopPropagation()"><div class="modal-header"><div class="modal-title">Excluir produto</div><button class="btn-icon" onclick="closeModal()">✕</button></div><p style="font-size:13px;color:var(--text2);margin-bottom:18px">Tem certeza que deseja excluir <b>${m.nome}</b>?</p><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn" style="background:var(--danger);color:#fff;border-color:var(--danger)" onclick="execDelProd()">Excluir</button></div></div></div>`;
  return'';
}
function renderKitBlock(k,i,plats){
  const hasML=plats.some(pl=>pl==='ml_classico'||pl==='ml_premium');
  return`<div class="kit-block"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
    <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;flex-wrap:wrap">
      Kit <input type="number" class="form-input" style="width:65px" value="${k.qty||''}" min="1" placeholder="qtd" onchange="ST.modal.p.kits[${i}].qty=parseInt(this.value)||null"/> peças
      ${hasML?`<span style="font-size:11px;color:var(--text3)">Peso ML:</span><input type="number" class="form-input" style="width:70px" value="${k.peso_kg||''}" min="0" step="0.1" placeholder="0.0" onchange="ST.modal.p.kits[${i}].peso_kg=parseFloat(this.value)||0"/> kg`:''}
    </div>
    <button class="btn-icon danger" onclick="rmKit(${i})">🗑️</button>
  </div>
  ${plats.length===0?`<div style="font-size:11px;color:var(--text3);text-align:center">Selecione plataformas primeiro</div>`:`
    <div style="display:grid;grid-template-columns:70px repeat(${plats.length},1fr);gap:5px;align-items:center;font-size:11px">
      <div></div>${plats.map(pl=>{const po=PLATS.find(x=>x.id===pl);return`<div style="text-align:center;color:var(--text3);font-weight:600">${po?.label||pl}</div>`;}).join('')}
      <div style="color:var(--text3);font-weight:500">Preço</div>${plats.map(pl=>`<input type="number" class="form-input" style="font-size:11px;padding:5px" placeholder="0.00" value="${k.precos?.[pl]||''}" onchange="ST.modal.p.kits[${i}].precos['${pl}']=parseFloat(this.value)||null"/>`).join('')}
      <div style="color:var(--text3);font-weight:500">Custo</div>${plats.map(pl=>`<input type="number" class="form-input" style="font-size:11px;padding:5px" placeholder="0.00" value="${k.custos?.[pl]||''}" onchange="ST.modal.p.kits[${i}].custos['${pl}']=parseFloat(this.value)||null"/>`).join('')}
    </div>`}
  </div>`;
}

function selC(id){ST.activeId=id;ST.tab='busca';ST.open={};ST.search={q:'',scope:'todos'};render();}
function setTab(t){ST.tab=t;render();}
function togOpen(id){ST.open[id]=!ST.open[id];
  const el=document.getElementById('search-results');
  if(el&&ST.tab==='busca'){updateSearch();return;}
  renderTab();
}
function openNewClient(){ST.modal={type:'nc'};render();}
async function saveNewClient(){
  const name=document.getElementById('nc-n')?.value?.trim();if(!name)return;
  const color=COLORS[ST.clients.length%COLORS.length];
  const{data,error}=await sb.from('prec_clients').insert({name,color,taxas:mkTaxas(),regra_tipo:'peca',regra_t1:1.20,regra_t2:1.50,regra_t3:1.80}).select().single();
  if(error){toast('Erro ao criar cliente','error');return;}
  const nc={...data,produtos:[],taxas:data.taxas};ST.clients.push(nc);ST.activeId=nc.id;ST.modal=null;toast('Cliente criado!');render();
}
function openNewProd(){ST.modal={type:'prod',edit:false,clientId:ST.activeId,p:{sku:'',nome:'',fabricacao:false,plataformas:[],kits:[],foto_url:null,links:{}}};render();}
function openEditProd(pid,cid){
  const cli=ST.clients.find(c=>String(c.id)===String(cid))||gc();
  const p=cli?.produtos?.find(x=>String(x.id)===String(pid));if(!p)return;
  ST.modal={type:'prod',edit:true,clientId:cli.id,p:JSON.parse(JSON.stringify(p))};render();
}
function confirmDelProd(pid){const p=gc()?.produtos?.find(x=>String(x.id)===String(pid));ST.modal={type:'del',pid,nome:p?.nome||'produto'};render();}
async function execDelProd(){
  const pid=ST.modal.pid;await deleteProduct(pid);
  const c=gc();if(c)c.produtos=c.produtos.filter(x=>String(x.id)!==String(pid));
  ST.modal=null;toast('Produto excluído');render();
}
function togPlat(pl){const p=ST.modal.p;const idx=(p.plataformas||[]).indexOf(pl);if(idx>=0)p.plataformas.splice(idx,1);else p.plataformas.push(pl);render();}
function addKit(){ST.modal.p.kits.push({qty:null,precos:{},custos:{},peso_kg:0});render();}
function rmKit(i){ST.modal.p.kits.splice(i,1);render();}
async function saveProduto(){
  const m=ST.modal;const p=m.p;
  p.sku=document.getElementById('p-sku')?.value?.trim();
  p.nome=document.getElementById('p-nome')?.value?.trim();
  if(!p.nome){toast('Informe o nome do produto','error');return;}
  if(!p.links)p.links={};
  PLATS.forEach(pl=>{const el=document.getElementById('link-'+pl.id);if(el)p.links[pl.id]=el.value.trim()||null;});
  const btn=document.getElementById('save-btn');if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  const cli=ST.clients.find(c=>String(c.id)===String(m.clientId));
  await saveProduct(p,cli.id);
  if(m.edit){const idx=cli.produtos.findIndex(x=>String(x.id)===String(p.id));if(idx>=0)cli.produtos[idx]=p;else cli.produtos.push(p);}
  else cli.produtos.push(p);
  ST.modal=null;toast(m.edit?'Produto atualizado!':'Produto cadastrado!');render();
}
function updTaxa(pl,tipo,i,v){gc().taxas[pl][tipo][i].v=parseFloat(v)||0;}
function updTaxaNome(pl,tipo,i,v){gc().taxas[pl][tipo][i].n=v;}
function rmTaxa(pl,tipo,i){gc().taxas[pl][tipo].splice(i,1);renderTab();}
function addTaxa(pl,tipo){const id=tipo==='perc'?`an-${pl}`:`af-${pl}`;const el=document.getElementById(id);const name=el?.value?.trim();if(!name)return;gc().taxas[pl][tipo].push({n:name,v:0});el.value='';renderTab();}
async function saveTaxas(){const c=gc();await sb.from('prec_clients').update({taxas:c.taxas}).eq('id',c.id);toast('Taxas salvas!');}
function setRegraTipo(t){gc().regra_tipo=t;renderTab();}
function updRegra(f,v){gc()[f]=parseFloat(v)||0;renderTab();}
async function saveConfig(){const c=gc();await sb.from('prec_clients').update({regra_tipo:c.regra_tipo,regra_t1:c.regra_t1,regra_t2:c.regra_t2,regra_t3:c.regra_t3}).eq('id',c.id);toast('Configurações salvas!');}
function closeModal(e){if(e&&e.target!==e.currentTarget)return;ST.modal=null;render();}
async function handleFoto(input){
  const file=input.files[0];if(!file)return;
  const ext=file.name.split('.').pop();const path=`produtos/${Date.now()}.${ext}`;
  const{data,error}=await sb.storage.from('product-images').upload(path,file,{upsert:true});
  if(error){toast('Erro ao enviar foto','error');return;}
  const{data:{publicUrl}}=sb.storage.from('product-images').getPublicUrl(path);
  ST.modal.p.foto_url=publicUrl;render();
}
function onCalcProd(id){
  ST.calc.prodId=id;ST.calc.kit=null;ST.calc.preco='';ST.calc.custo='';ST.calc.peso='';
  const cli=gc();const p=cli.produtos.find(x=>String(x.id)===id);
  if(p&&p.kits.length===1){ST.calc.kit=p.kits[0].qty;onCalcKit(p.kits[0].qty);return;}
  renderTab();
}
function onCalcKit(qty){
  qty=parseInt(qty)||null;ST.calc.kit=qty;
  const cli=gc();const p=cli.produtos.find(x=>String(x.id)===String(ST.calc.prodId));
  const k=p?.kits?.find(x=>x.qty===qty);
  if(k){const pl=ST.calc.plat;if(k.precos?.[pl])ST.calc.preco=String(k.precos[pl]);if(k.custos?.[pl])ST.calc.custo=String(k.custos[pl]);if(k.peso_kg)ST.calc.peso=String(k.peso_kg);}
  renderTab();
}

loadAll();
</script>
</body>
</html>
